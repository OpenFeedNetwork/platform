<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candor Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0B0F17;color:#E2EAF6;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.panel{background:#111722;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:32px;width:100%;max-width:420px;}
.logo{text-align:center;margin-bottom:28px;}
.logo-title{font-size:22px;font-weight:600;color:#E2EAF6;letter-spacing:1px;}
.logo-sub{font-size:11px;color:#4A5F7A;letter-spacing:2px;margin-top:4px;}
.badge{display:inline-block;background:rgba(41,208,138,0.1);color:#29D08A;border:1px solid rgba(41,208,138,0.2);border-radius:20px;padding:3px 12px;font-size:10px;margin-top:8px;letter-spacing:1px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;color:#4A5F7A;letter-spacing:1px;margin-bottom:6px;}
.field input{width:100%;background:#0B0F17;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:11px 14px;color:#E2EAF6;font-size:14px;outline:none;transition:border-color 0.15s;}
.field input:focus{border-color:#29D08A;}
.btn{width:100%;padding:12px;background:#29D08A;color:#0B0F17;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn:hover{background:#22B876;}
.btn:disabled{background:#1A2235;color:#4A5F7A;cursor:not-allowed;}
.btn-sm{padding:7px 16px;font-size:12px;border-radius:6px;width:auto;}
.btn-red{background:#FF6B6B;color:#fff;}
.btn-outline{background:transparent;color:#29D08A;border:1px solid rgba(41,208,138,0.3);margin-top:8px;}
.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#FF6B6B;margin-bottom:16px;display:none;}
.dashboard{display:none;max-width:900px;width:100%;padding:24px;}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.dash-title{font-size:20px;font-weight:600;}
.dash-sub{font-size:12px;color:#4A5F7A;margin-top:2px;}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.stat{background:#111722;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px;}
.stat-num{font-size:32px;font-weight:600;color:#29D08A;margin-bottom:4px;}
.stat-num.blue{color:#3B9EFF;}
.stat-num.amber{color:#F5C842;}
.stat-label{font-size:12px;color:#4A5F7A;}
.stat-sub{font-size:11px;color:#29D08A;margin-top:4px;}
.section{background:#111722;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px;margin-bottom:16px;}
.section-title{font-size:13px;font-weight:600;color:#E2EAF6;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.dot{width:6px;height:6px;border-radius:50%;background:#29D08A;animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-size:10px;color:#4A5F7A;text-align:left;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.07);letter-spacing:0.5px;}
td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05);color:#7A92B4;}
td:first-child{color:#E2EAF6;}
.loading{text-align:center;padding:40px;color:#4A5F7A;font-size:13px;}
</style>
</head>
<body>
<div class="panel" id="loginPanel">
  <div class="logo">
    <div class="logo-title">CANDOR ◆</div>
    <div class="logo-sub">ADMIN DASHBOARD</div>
    <span class="badge">SECURE ACCESS</span>
  </div>
  <div class="error" id="errorMsg"></div>
  <div class="field">
    <label>ADMIN PASSWORD</label>
    <input type="password" id="adminPassword" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" onclick="login()" id="loginBtn">Enter Dashboard →</button>
</div>
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-title">◆ Candor Admin</div>
      <div class="dash-sub">Open Feed Network · <span id="lastRefresh">Loading...</span></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-sm btn-outline" style="width:auto;" onclick="loadDashboard()">↻ Refresh</button>
      <button class="btn btn-sm btn-red" style="width:auto;" onclick="logout()">Sign Out</button>
    </div>
  </div>
  <div id="dashContent"><div class="loading">Loading dashboard data...</div></div>
</div>
<script>
const API = "https://open-feed-platform.fly.dev";
let token = sessionStorage.getItem("candor_admin_token");
if(token) showDashboard();
function showError(msg){ const el=document.getElementById("errorMsg"); el.textContent=msg; el.style.display="block"; }
async function login(){
  const pw=document.getElementById("adminPassword").value;
  if(!pw){ showError("Enter your password"); return; }
  const btn=document.getElementById("loginBtn");
  btn.disabled=true; btn.textContent="Verifying...";
  try {
    const res=await fetch(API+"/api/v1/admin/auth/password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
    const data=await res.json();
    if(data.token){ sessionStorage.setItem("candor_admin_token",data.token); token=data.token; showDashboard(); }
    else { showError(data.error||"Invalid password"); btn.disabled=false; btn.textContent="Enter Dashboard →"; }
  } catch(e){ showError("Connection error. Try again."); btn.disabled=false; btn.textContent="Enter Dashboard →"; }
}
function showDashboard(){ document.getElementById("loginPanel").style.display="none"; document.getElementById("dashboard").style.display="block"; document.body.style.alignItems="flex-start"; loadDashboard(); }
function logout(){ sessionStorage.removeItem("candor_admin_token"); location.reload(); }
async function loadDashboard(){
  document.getElementById("lastRefresh").textContent="Loading...";
  try {
    const res=await fetch(API+"/api/v1/admin/stats",{headers:{"Authorization":"Bearer "+token}});
    if(res.status===401){ logout(); return; }
    const d=await res.json();
    renderDashboard(d);
    document.getElementById("lastRefresh").textContent="Updated "+new Date().toLocaleTimeString();
  } catch(e){ document.getElementById("dashContent").innerHTML="<div class=\"loading\">Failed to load. Check connection.</div>"; }
}
function renderDashboard(d){
  const users=d.users||{}, posts=d.posts||{}, recent=d.recent_users||[], rp=d.recent_posts||[];
  document.getElementById("dashContent").innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-num">${users.total||0}</div><div class="stat-label">Total Users</div><div class="stat-sub">+${users.today||0} today</div></div>
      <div class="stat"><div class="stat-num blue">${posts.total||0}</div><div class="stat-label">Total Posts</div><div class="stat-sub">+${posts.today||0} today</div></div>
      <div class="stat"><div class="stat-num amber">${users.this_week||0}</div><div class="stat-label">This Week</div><div class="stat-sub">Last 7 days</div></div>
      <div class="stat"><div class="stat-num">${rp.length}</div><div class="stat-label">Recent Posts</div><div class="stat-sub">Last 10</div></div>
    </div>
    <div class="section">
      <div class="section-title"><span class="dot"></span> Recent Signups</div>
      ${recent.length===0?"<div style=\"color:#4A5F7A;font-size:13px;\">No users yet — share the invite!</div>":
      "<table><thead><tr><th>USERNAME</th><th>EMAIL</th><th>JOINED</th></tr></thead><tbody>"+
      recent.map(u=>"<tr><td>@"+u.username+"</td><td>"+(u.email||"anonymous")+"</td><td>"+new Date(u.created_at).toLocaleDateString()+"</td></tr>").join("")+
      "</tbody></table>"}
    </div>
    <div class="section">
      <div class="section-title"><span class="dot"></span> Recent Posts</div>
      ${rp.length===0?"<div style=\"color:#4A5F7A;font-size:13px;\">No posts yet.</div>":
      "<table><thead><tr><th>USER</th><th>CONTENT</th><th>DATE</th></tr></thead><tbody>"+
      rp.map(p=>"<tr><td>@"+p.username+"</td><td>"+(p.content||"").substring(0,80)+(p.content&&p.content.length>80?"\u2026":"")+"</td><td>"+new Date(p.created_at).toLocaleDateString()+"</td></tr>").join("")+
      "</tbody></table>"}
    </div>`;
}
</script>
</body>
</html>
