# Option 1 — Upstash Redis (recommended — serverless, pay-per-use)
# Free tier: 10,000 commands/day — enough for early launch
# Paid: $0.20 per 100K commands — scales with traffic
# Deploy: fly upstash redis create --name ofa-cache

# Option 2 — Fly.io managed Redis (if you prefer dedicated)
app = "ofa-cache"
primary_region = "mia"  # Miami — closest to Florida

[build]
  image = "redis:7-alpine"

[mounts]
  source = "redis_data"
  destination = "/data"

[[services]]
  internal_port = 6379
  protocol      = "tcp"

  [[services.ports]]
    port = 6379

[env]
  REDIS_MAXMEMORY          = "256mb"
  REDIS_MAXMEMORY_POLICY   = "allkeys-lru"
  REDIS_SAVE               = "3600 1"
  REDIS_APPENDONLY         = "no"
