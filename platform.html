<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candor: The Open Feed Network</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0C0F14; color: #E8EDF5; font-family: DM Sans, sans-serif; }
#app { min-height: 100vh; }
.card { background: #13171F; border-radius: 16px; border: 1px solid #1E2535; margin-bottom: 10px; overflow: hidden; }
.btn-green { background: #1D9E75; color: #0C0F14; border: none; border-radius: 20px; padding: 8px 16px; font-weight: 600; font-size: 13px; cursor: pointer; }
input, textarea { background: #0C0F14; border: 1px solid #1E2535; border-radius: 10px; padding: 11px 14px; color: #E8EDF5; font-size: 14px; width: 100%; outline: none; }
textarea { border-radius: 12px; resize: none; line-height: 1.65; }
.nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(12,15,20,0.95); border-top: 1px solid #1E2535; display: flex; z-index: 50; }
.nav-btn { flex: 1; padding: 12px 6px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: #5F5E5A; border-top: 2px solid transparent; font-size: 9px; }
.nav-btn.active { color: #1D9E75; border-top-color: #1D9E75; }
</style>
</head>
<body>
<div id="app"></div>
<script>

// ── STATE ──────────────────────────────────────────────────────────────────
var S = {
  user: null, token: null,
  tab: 'feed', posts: [], loading: false,
  composing: false, liked: {}, voted: {},
  shieldResult: null, authMode: 'login', category: 'all'
};

// ── CONSTANTS ──────────────────────────────────────────────────────────────
var API = 'https://open-feed-platform.fly.dev';

var MOCK = [
  { id:'m1', username:'aisha_okafor', tier:'whistleblower', category:'Civil Rights', created_at:'3h ago',
    content:'Raw unedited photo from today\'s protest at the state capitol. Police deployed crowd dispersal on peaceful marchers. No filters, no edits.',
    media:'photo', score:96, likes:7842, comments:1240, shares:5621, suppressed:true, ipfs:'QmTs4Jkl012' },
  { id:'m2', username:'rafael_moreno', tier:'anonymous', category:'Accountability', created_at:'6h ago',
    content:'47-minute full hearing footage. City officials caught on record approving rezoning without public notice. Key moment at 14:32.',
    media:'video', duration:'47:13', key:'14:32', score:93, likes:4100, comments:770, shares:3800, suppressed:false, ipfs:'QmAv7Xyz789' },
  { id:'m3', username:'maria_chen', tier:'standard', category:'Environment', created_at:'2h ago',
    content:'After 8 months of FOIA requests, I obtained EPA documents showing three water systems falsified lead testing results. 4x the legal limit.',
    media:'text', score:97, likes:5621, comments:892, shares:3200, suppressed:true, ipfs:'QmTs1Abc123' },
  { id:'m4', username:'devon_williams', tier:'anonymous', category:'Housing', created_at:'4h ago',
    content:'City council voted 7-0 to rezone displacing 847 affordable housing units. 2,100 residents affected. Zero local news coverage.',
    media:'text', score:91, likes:2890, comments:445, shares:1900, suppressed:true, ipfs:'QmTs2Def456' },
  { id:'m5', username:'sponsored_brand', tier:'standard', category:'Sponsored', created_at:'1h ago',
    content:'Transform your life with our AI wellness program! Join 50,000 happy customers. Limited time 70% off!',
    media:'text', score:11, likes:32, comments:3, shares:8, suppressed:false, ipfs:null }
];

var TIERS = {
  standard:      { icon:'U', label:'Standard',      color:'#85B7EB' },
  anonymous:     { icon:'A', label:'Anonymous',     color:'#1D9E75' },
  whistleblower: { icon:'W', label:'Whistleblower', color:'#AFA9EC' }
};

var CATS = [
  { id:'all', icon:'F', label:'All' },
  { id:'photo', icon:'P', label:'Photo' },
  { id:'video', icon:'V', label:'Video' },
  { id:'housing', icon:'H', label:'Housing' },
  { id:'environment', icon:'E', label:'Environ' }
];

var PROPOSALS = [
  { id:'g1', title:'Increase source credibility weight: 0.30 to 0.35', proposer:'@rafaelm', yes:847, no:213, days:3, status:'open' },
  { id:'g2', title:'Add academic research bonus +10% CANDOR score', proposer:'@priyanair', yes:1240, no:89, days:5, status:'open' },
  { id:'g3', title:'Increase ad penalty from 30 to 35 points', proposer:'@aishaokafor', yes:2100, no:340, days:0, status:'passed' }
];

// ── HELPERS ────────────────────────────────────────────────────────────────
function cc(s) { return s >= 75 ? '#1D9E75' : s >= 45 ? '#EF9F27' : '#E24B4A'; }

function ring(score, size) {
  size = size || 52;
  var r = 22;
  var ci = 2 * Math.PI * r;
  var off = ci - (score / 100) * ci;
  var c = cc(score);
  var svg = '<svg width="SIZE" height="SIZE" viewBox="0 0 52 52">'
    + '<circle cx="26" cy="26" r="22" fill="none" stroke="#1E2535" stroke-width="3"/>'
    + '<circle cx="26" cy="26" r="22" fill="none" stroke="COL" stroke-width="3"'
    + ' stroke-dasharray="CI" stroke-dashoffset="OFF"'
    + ' stroke-linecap="round" transform="rotate(-90 26 26)"/>'
    + '<text x="26" y="22" text-anchor="middle" fill="COL" font-size="13" font-weight="500" font-family="monospace">SC</text>'
    + '<text x="26" y="33" text-anchor="middle" fill="COL" font-size="6.5" font-family="monospace" letter-spacing="0.5">CANDOR</text>'
    + '</svg>';
  return svg
    .replace(/SIZE/g, size)
    .replace(/COL/g, c)
    .replace('CI', ci.toFixed(1))
    .replace('OFF', off.toFixed(1))
    .replace('SC', score);
}

function av(username) {
  return (username || 'XX').substring(0, 2).toUpperCase();
}

function normPost(p) {
  return {
    id: p.id,
    username: p.username || 'unknown',
    tier: p.tier || 'standard',
    category: p.category || 'General',
    created_at: p.created_at ? new Date(p.created_at).toLocaleString() : 'just now',
    content: p.content || '',
    media: p.media_url ? 'photo' : (p.content_type || 'text'),
    score: p.candor_score || 75,
    likes: parseInt(p.likes) || 0,
    comments: parseInt(p.comments) || 0,
    shares: parseInt(p.shares) || 0,
    suppressed: !!p.suppress_post,
    ipfs: p.ipfs_hash || null
  };
}

// ── RENDER HELPERS ─────────────────────────────────────────────────────────
function renderRing(score) {
  var c = cc(score);
  var v = score >= 75 ? 'Legitimate' : score >= 45 ? 'Unverified' : 'Low CANDOR';
  return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:' + c + '08;border-top:1px solid #1E2535;border-bottom:1px solid #1E2535;">'
    + ring(score, 44)
    + '<div style="flex:1">'
    + '<div style="font-size:11px;color:' + c + ';font-weight:500;">' + v + ' - Truth Shield</div>'
    + '<div style="height:4px;background:#1E2535;border-radius:2px;margin-top:5px;overflow:hidden;">'
    + '<div style="height:4px;width:' + score + '%;background:' + c + ';border-radius:2px;"></div>'
    + '</div></div>'
    + '<span style="font-size:18px;">&#128737;</span>'
    + '</div>';
}

function renderMediaPhoto(p) {
  var c = cc(p.score);
  var v = p.score >= 75 ? 'Legitimate' : p.score >= 45 ? 'Unverified' : 'Low CANDOR';
  return '<div style="position:relative;height:200px;background:#111820;display:flex;align-items:center;justify-content:center;overflow:hidden;">'
    + '<span style="font-size:60px;opacity:0.1;">&#128247;</span>'
    + '<div style="position:absolute;top:10px;left:10px;background:#185FA530;border:1px solid #185FA550;border-radius:20px;padding:3px 10px;font-size:10px;color:#85B7EB;font-weight:500;">&#128247; Photo</div>'
    + (p.suppressed ? '<div style="position:absolute;top:10px;right:10px;background:#BA751525;border:1px solid #BA751545;border-radius:20px;padding:3px 8px;font-size:10px;color:#EF9F27;font-weight:500;">Restored</div>' : '')
    + '<div style="position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:rgba(12,15,20,0.8);display:flex;align-items:center;justify-content:space-between;">'
    + '<div style="display:flex;align-items:center;gap:10px;">' + ring(p.score)
    + '<div><div style="font-size:11px;color:' + c + ';font-weight:500;">' + v + '</div>'
    + '<div style="font-size:10px;color:#5F5E5A;">Truth Shield</div></div></div>'
    + '<div style="font-size:10px;color:' + c + ';background:' + c + '15;border:1px solid ' + c + '30;border-radius:20px;padding:5px 10px;">&#128737; Protected</div>'
    + '</div></div>';
}

function renderMediaVideo(p) {
  var c = cc(p.score);
  var v = p.score >= 75 ? 'Legitimate' : p.score >= 45 ? 'Unverified' : 'Low CANDOR';
  return '<div style="position:relative;height:200px;background:#0e1218;display:flex;align-items:center;justify-content:center;overflow:hidden;">'
    + '<span style="font-size:60px;opacity:0.1;">&#127909;</span>'
    + '<div style="position:absolute;width:58px;height:58px;border-radius:50%;background:rgba(12,15,20,0.8);border:2px solid rgba(232,237,245,0.1);display:flex;align-items:center;justify-content:center;font-size:22px;padding-left:3px;">&#9654;</div>'
    + '<div style="position:absolute;top:10px;left:10px;background:#A32D2D;border-radius:4px;padding:3px 10px;font-size:10px;color:#FCEBEB;font-weight:500;">&#9679; VIDEO</div>'
    + (p.duration ? '<div style="position:absolute;top:10px;right:10px;background:rgba(12,15,20,0.7);border-radius:4px;padding:2px 8px;font-size:10px;color:#B4B2A9;font-family:monospace;">' + p.duration + '</div>' : '')
    + '<div style="position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:rgba(12,15,20,0.8);display:flex;align-items:center;justify-content:space-between;">'
    + '<div style="display:flex;align-items:center;gap:10px;">' + ring(p.score)
    + '<div><div style="font-size:11px;color:' + c + ';font-weight:500;">' + v + '</div>'
    + '<div style="font-size:10px;color:#5F5E5A;">Truth Shield</div>'
    + (p.key ? '<div style="font-size:10px;color:#EF9F27;">Key: ' + p.key + '</div>' : '')
    + '</div></div>'
    + '<div style="font-size:10px;color:' + c + ';background:' + c + '15;border:1px solid ' + c + '30;border-radius:20px;padding:5px 10px;">&#128737; Protected</div>'
    + '</div></div>';
}

function renderPost(p) {
  var t = TIERS[p.tier] || TIERS.standard;
  var c = cc(p.score);
  var low = p.score < 45;
  var lk = !!S.liked[p.id];

  var media = p.media === 'photo' ? renderMediaPhoto(p)
    : p.media === 'video' ? renderMediaVideo(p)
    : renderRing(p.score);

  return '<div class="card" style="' + (low ? 'opacity:0.75;border-color:#E24B4A20;' : '') + '">'
    + '<div style="display:flex;align-items:center;gap:8px;padding:12px 12px 8px;">'
    + '<div style="width:34px;height:34px;border-radius:50%;background:' + t.color + '22;border:1.5px solid ' + t.color + '44;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:' + t.color + ';flex-shrink:0;">' + av(p.username) + '</div>'
    + '<div style="flex:1;"><div style="font-size:13px;font-weight:500;color:#E8EDF5;">@' + p.username + '</div>'
    + '<div style="font-size:10px;color:#5F5E5A;">' + p.created_at + ' - ' + p.category + '</div></div>'
    + '<div style="display:flex;align-items:center;gap:4px;background:' + t.color + '18;border:1px solid ' + t.color + '30;border-radius:20px;padding:3px 8px;font-size:10px;color:' + t.color + ';font-weight:500;">' + t.label + '</div>'
    + '</div>'
    + '<p style="font-size:13px;color:' + (low ? '#888780' : '#B4B2A9') + ';line-height:1.65;margin:0;padding:0 12px 10px;">' + p.content + '</p>'
    + media
    + (low ? '<div style="padding:8px 12px;background:#E24B4A08;border-top:1px solid #E24B4A15;font-size:10px;color:#F09595;">Context: Low CANDOR score. Verify independently.</div>' : '')
    + (p.suppressed ? '<div style="padding:6px 12px;background:#BA751508;border-top:1px solid #BA751520;font-size:10px;color:#EF9F27;">&#9888; Platform suppressed this - Truth Shield restored it</div>' : '')
    + (p.ipfs ? '<div style="padding:4px 12px;font-size:10px;color:#2A3040;font-family:monospace;">IPFS: ' + p.ipfs.substring(0, 14) + '...</div>' : '')
    + '<div style="display:flex;gap:16px;padding:8px 12px 12px;border-top:1px solid #1E2535;">'
    + '<button onclick="like(\'' + p.id + '\')" style="background:none;border:none;cursor:pointer;color:' + (lk ? '#E24B4A' : '#5F5E5A') + ';font-size:13px;">' + (lk ? '&#9829;' : '&#9825;') + ' ' + (p.likes + (lk ? 1 : 0)).toLocaleString() + '</button>'
    + '<button style="background:none;border:none;color:#5F5E5A;font-size:13px;">&#128172; ' + p.comments.toLocaleString() + '</button>'
    + '<button style="background:none;border:none;color:#5F5E5A;font-size:13px;">&#8599; ' + p.shares.toLocaleString() + '</button>'
    + (p.media === 'video' ? '<button style="margin-left:auto;background:none;border:none;color:#1D9E75;font-size:12px;font-weight:500;cursor:pointer;">&#9654; Watch</button>' : '')
    + '</div></div>';
}

// ── VIEWS ──────────────────────────────────────────────────────────────────
function viewFeed() {
  var filtered = S.category === 'all' ? S.posts : S.posts.filter(function(p) {
    return p.media === S.category || (p.category && p.category.toLowerCase().indexOf(S.category) > -1);
  });
  var sup = S.posts.filter(function(p) { return p.suppressed; }).length;

  var cats = CATS.map(function(c) {
    var active = S.category === c.id;
    return '<div onclick="setCat(\'' + c.id + '\')" style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;">'
      + '<div style="width:48px;height:48px;border-radius:50%;border:2px solid ' + (active ? '#1D9E75' : '#1E2535') + ';display:flex;align-items:center;justify-content:center;background:' + (active ? '#0F6E5620' : '#13171F') + ';font-size:11px;font-weight:500;color:' + (active ? '#1D9E75' : '#5F5E5A') + ';">' + c.icon + '</div>'
      + '<div style="font-size:9px;color:' + (active ? '#1D9E75' : '#5F5E5A') + ';">' + c.label + '</div></div>';
  }).join('');

  var posts = S.loading
    ? '<div style="text-align:center;padding:40px;color:#5F5E5A;">Loading feed...</div>'
    : filtered.length === 0
    ? '<div class="card" style="padding:24px;text-align:center;border-color:#1D9E7530;"><div style="font-size:40px;margin-bottom:12px;">&#9998;</div><div style="font-size:14px;font-weight:500;color:#E8EDF5;margin-bottom:6px;">Be the first to post</div><div style="font-size:12px;color:#5F5E5A;">Share what others are afraid to say.</div></div>'
    : filtered.map(renderPost).join('');

  return '<div style="padding:10px 0 6px;display:flex;gap:10px;overflow-x:auto;margin-bottom:8px;">' + cats + '</div>'
    + '<div onclick="refresh()" style="background:#0F6E5610;border:1px solid #1D9E7525;border-radius:10px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">'
    + '<div style="font-size:11px;color:#1D9E75;font-weight:500;">&#8635; Tap to refresh feed</div>'
    + '<div style="font-size:10px;color:#0F6E56;font-weight:500;">Load</div></div>'
    + (sup > 0 ? '<div style="background:#BA751510;border:1px solid #BA751525;border-radius:10px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">'
      + '<div><div style="font-size:11px;font-weight:500;color:#EF9F27;">&#9888; ' + sup + ' posts restored by Truth Shield</div>'
      + '<div style="font-size:10px;color:#5F5E5A;margin-top:1px;">Suppressed on other platforms</div></div>'
      + '<div style="font-size:10px;color:#1D9E75;font-weight:500;">All visible</div></div>' : '')
    + posts;
}

function viewShield() {
  var c = S.shieldResult ? cc(S.shieldResult.score) : '#1D9E75';
  var v = S.shieldResult ? (S.shieldResult.score >= 75 ? 'Legitimate' : S.shieldResult.score >= 45 ? 'Unverified' : 'Low CANDOR') : '';
  var result = S.shieldResult
    ? '<div style="margin-top:14px;padding:14px;background:' + c + '08;border:1px solid ' + c + '30;border-radius:12px;">'
      + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">'
      + ring(S.shieldResult.score, 56)
      + '<div><div style="font-size:13px;font-weight:500;color:' + c + ';">' + v + '</div>'
      + '<div style="font-size:11px;color:#5F5E5A;">Confidence: ' + S.shieldResult.score + '%</div></div></div>'
      + '<p style="font-size:12px;color:#B4B2A9;line-height:1.6;margin:0;">' + S.shieldResult.reasoning + '</p></div>'
    : '';

  return '<div class="card" style="padding:16px;margin-bottom:12px;">'
    + '<div style="font-size:15px;font-weight:500;color:#E8EDF5;margin-bottom:4px;">&#128737; Truth Shield Analysis</div>'
    + '<div style="font-size:12px;color:#5F5E5A;line-height:1.6;margin-bottom:14px;">Submit any content for real-time disinformation analysis.</div>'
    + '<textarea id="sc" rows="4" placeholder="Paste any content to analyze..."></textarea>'
    + '<div style="margin-top:10px;"><button onclick="analyze()" class="btn-green">Analyze</button></div>'
    + result + '</div>'
    + '<div class="card" style="padding:16px;">'
    + '<div style="font-size:13px;font-weight:500;color:#E8EDF5;margin-bottom:12px;">Platform Stats</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
    + [['Total Analyzed','48,291','#85B7EB'],['Suppression Blocked','12,847','#1D9E75'],['Content Restored','9,614','#1D9E75'],['Avg Confidence','87%','#EF9F27']].map(function(x) {
        return '<div style="background:#0C0F14;border-radius:10px;padding:10px 12px;border:1px solid #1E2535;">'
          + '<div style="font-size:18px;font-weight:500;color:' + x[2] + ';font-family:monospace;">' + x[1] + '</div>'
          + '<div style="font-size:10px;color:#5F5E5A;margin-top:2px;">' + x[0] + '</div></div>';
      }).join('')
    + '</div></div>';
}

function viewGovernance() {
  var weights = [['source_credibility','0.30','#1D9E75'],['claim_verifiability','0.25','#1D9E75'],['public_interest','0.20','#85B7EB'],['community_verify','0.15','#EF9F27'],['engagement_auth','0.10','#EF9F27']];

  var whtml = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">'
    + weights.map(function(w) {
        return '<div style="background:#0C0F14;border-radius:8px;padding:8px 10px;border:1px solid #1E2535;">'
          + '<div style="font-size:14px;font-weight:500;color:' + w[2] + ';font-family:monospace;">' + w[1] + '</div>'
          + '<div style="font-size:9px;color:#5F5E5A;margin-top:1px;">' + w[0] + '</div></div>';
      }).join('')
    + '</div>';

  var phtml = PROPOSALS.map(function(p) {
    var mv = S.voted[p.id];
    var yes = p.yes + (mv === 'yes' ? 1 : 0);
    var no = p.no + (mv === 'no' ? 1 : 0);
    var pct = Math.round((yes / (yes + no)) * 100);
    var passed = p.status === 'passed';

    var vbtns = p.status === 'open' && !mv
      ? '<div style="display:flex;gap:8px;">'
        + '<button onclick="vote(\'' + p.id + '\',\'yes\')" style="padding:7px 16px;border-radius:20px;background:#1D9E7518;border:1px solid #1D9E7530;color:#1D9E75;font-size:12px;font-weight:500;cursor:pointer;">&#10003; Yes</button>'
        + '<button onclick="vote(\'' + p.id + '\',\'no\')" style="padding:7px 16px;border-radius:20px;background:#E24B4A18;border:1px solid #E24B4A30;color:#E24B4A;font-size:12px;font-weight:500;cursor:pointer;">&#10007; No</button></div>'
      : mv ? '<div style="font-size:11px;color:' + (mv === 'yes' ? '#1D9E75' : '#E24B4A') + ';font-family:monospace;">&#10003; Voted ' + mv.toUpperCase() + '</div>' : '';

    return '<div class="card" style="padding:16px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'
      + '<div style="flex:1;margin-right:12px;font-size:13px;color:#E8EDF5;font-weight:500;line-height:1.4;">' + p.title + '</div>'
      + '<div style="font-size:10px;color:' + (passed ? '#1D9E75' : '#EF9F27') + ';background:' + (passed ? '#1D9E7518' : '#EF9F2718') + ';border:1px solid ' + (passed ? '#1D9E7530' : '#EF9F2730') + ';border-radius:20px;padding:3px 8px;white-space:nowrap;">' + (passed ? '&#10003; Passed' : '&#9203; ' + p.days + 'd left') + '</div></div>'
      + '<div style="font-size:10px;color:#5F5E5A;margin-bottom:10px;">By ' + p.proposer + ' - ' + (yes + no).toLocaleString() + ' votes</div>'
      + '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">'
      + '<span style="font-size:11px;color:#1D9E75;font-family:monospace;">&#10003; ' + yes.toLocaleString() + ' (' + pct + '%)</span>'
      + '<span style="font-size:11px;color:#E24B4A;font-family:monospace;">&#10007; ' + no.toLocaleString() + ' (' + (100 - pct) + '%)</span></div>'
      + '<div style="height:6px;background:#1E2535;border-radius:3px;margin-bottom:12px;overflow:hidden;">'
      + '<div style="height:6px;border-radius:3px;width:' + pct + '%;background:linear-gradient(90deg,#1D9E75,#2ECC9A);"></div></div>'
      + vbtns + '</div>';
  }).join('');

  return '<div class="card" style="padding:16px;margin-bottom:12px;border-color:#1D9E7530;">'
    + '<div style="font-size:13px;font-weight:500;color:#E8EDF5;margin-bottom:4px;">&#128379; Community Governance</div>'
    + '<div style="font-size:12px;color:#5F5E5A;line-height:1.6;margin-bottom:12px;">Algorithm weights controlled by community on-chain votes.</div>'
    + whtml + '</div>' + phtml;
}

function viewProfile() {
  var t = TIERS[S.user.tier] || TIERS.standard;
  return '<div class="card" style="padding:20px;">'
    + '<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">'
    + '<div style="width:60px;height:60px;border-radius:50%;background:' + t.color + '22;border:2px solid ' + t.color + '44;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:' + t.color + ';">' + av(S.user.username) + '</div>'
    + '<div><div style="font-size:16px;font-weight:500;color:#E8EDF5;">@' + S.user.username + '</div>'
    + '<div style="font-size:12px;color:' + t.color + ';margin-top:3px;">&#9670; ' + t.label + ' Account</div></div></div>'
    + '<button onclick="logout()" style="width:100%;padding:13px;border-radius:20px;background:#E24B4A15;border:1px solid #E24B4A30;color:#E24B4A;font-weight:600;font-size:14px;cursor:pointer;">Sign Out</button></div>';
}

function viewAuth() {
  var login = S.authMode !== 'register';
  return '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#0C0F14;">'
    + '<div style="margin-bottom:36px;text-align:center;">'
    + '<div style="font-size:36px;color:#E8EDF5;letter-spacing:1px;margin-bottom:6px;font-weight:300;">Candor &#9670;</div>'
    + '<div style="font-size:11px;color:#4A5568;letter-spacing:3px;margin-bottom:12px;">THE OPEN FEED NETWORK</div>'
    + '<div style="font-size:12px;color:#1D9E75;background:#1D9E7515;border:1px solid #1D9E7530;border-radius:20px;padding:5px 14px;display:inline-block;">&#9830; Anti-suppression - Truth Shield - IPFS</div></div>'
    + '<div style="width:100%;max-width:380px;background:#13171F;border-radius:20px;border:1px solid #1E2535;padding:24px;">'
    + '<div style="display:flex;gap:8px;margin-bottom:20px;">'
    + '<button onclick="setAuthMode(\'login\')" style="flex:1;padding:10px;border-radius:10px;border:1px solid ' + (login ? '#1D9E75' : '#1E2535') + ';background:' + (login ? '#1D9E7518' : 'transparent') + ';color:' + (login ? '#1D9E75' : '#5F5E5A') + ';font-weight:500;font-size:13px;cursor:pointer;">Sign In</button>'
    + '<button onclick="setAuthMode(\'register\')" style="flex:1;padding:10px;border-radius:10px;border:1px solid ' + (!login ? '#1D9E75' : '#1E2535') + ';background:' + (!login ? '#1D9E7518' : 'transparent') + ';color:' + (!login ? '#1D9E75' : '#5F5E5A') + ';font-weight:500;font-size:13px;cursor:pointer;">Register</button></div>'
    + '<div style="margin-bottom:12px;"><div style="font-size:11px;color:#5F5E5A;margin-bottom:6px;">USERNAME</div>'
    + '<input id="un" placeholder="your_username" onkeydown="if(event.key===\'Enter\')doAuth()"></div>'
    + '<div style="margin-bottom:20px;"><div style="font-size:11px;color:#5F5E5A;margin-bottom:6px;">PASSWORD</div>'
    + '<input id="pw" type="password" placeholder="password" onkeydown="if(event.key===\'Enter\')doAuth()"></div>'
    + '<button onclick="doAuth()" class="btn-green" style="width:100%;padding:13px;border-radius:20px;font-size:14px;">Sign In &#8594;</button>'
    + '<div style="margin-top:14px;padding:10px;background:#0C0F14;border-radius:10px;border:1px solid #1E2535;font-size:11px;color:#5F5E5A;line-height:1.8;">U Standard - A Anonymous - W Whistleblower</div></div></div>';
}

// ── MAIN RENDER ────────────────────────────────────────────────────────────
function render() {
  if (!S.user) { document.getElementById('app').innerHTML = viewAuth(); return; }

  var tabs = [
    { id:'feed', label:'Home', icon:'&#9750;' },
    { id:'shield', label:'Shield', icon:'&#128737;' },
    { id:'governance', label:'Vote', icon:'&#128379;' },
    { id:'profile', label:'Profile', icon:'&#128100;' }
  ];

  var titles = { feed:'&#128225; Open Feed', shield:'&#128737; Truth Shield', governance:'&#128379; Governance', profile:'&#128100; Profile' };
  var subs = {
    feed: 'Anti-suppression - CANDOR scored - IPFS stored',
    shield: 'Real-time analysis - Immutable verdicts',
    governance: 'Community-controlled algorithm - On-chain votes',
    profile: '@' + S.user.username + ' account'
  };

  var content = S.tab === 'feed' ? viewFeed()
    : S.tab === 'shield' ? viewShield()
    : S.tab === 'governance' ? viewGovernance()
    : viewProfile();

  var nav = '<nav class="nav-bar">'
    + tabs.map(function(t) {
        return '<button class="nav-btn ' + (S.tab === t.id ? 'active' : '') + '" onclick="setTab(\'' + t.id + '\')">'
          + '<span style="font-size:18px;">' + t.icon + '</span>'
          + t.label + '</button>';
      }).join('')
    + '</nav>';

  var compose = S.composing
    ? '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;">'
      + '<div style="width:100%;background:#13171F;border-radius:20px 20px 0 0;border:1px solid #1E2535;padding:20px;padding-bottom:40px;">'
      + '<div style="display:flex;justify-content:space-between;margin-bottom:14px;">'
      + '<div style="font-size:15px;font-weight:500;">New Post</div>'
      + '<button onclick="S.composing=false;render()" style="background:none;border:none;color:#5F5E5A;font-size:20px;cursor:pointer;">&#10005;</button></div>'
      + '<textarea id="cc" rows="5" placeholder="What is happening? Truth Shield will verify and protect your post..."></textarea>'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">'
      + '<div style="font-size:11px;color:#2A3040;">&#128737; Truth Shield - &#9830; IPFS</div>'
      + '<button class="btn-green" onclick="doPost()">Post &#8594;</button></div></div></div>'
    : '';

  document.getElementById('app').innerHTML =
    '<div style="min-height:100vh;background:#0C0F14;padding-bottom:80px;">'
    + '<div style="position:sticky;top:0;z-index:50;background:rgba(12,15,20,0.95);border-bottom:1px solid #1E2535;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;">'
    + '<div style="font-size:20px;color:#E8EDF5;font-weight:300;">Candor <span style="color:#1D9E75;">&#9830;</span></div>'
    + '<div style="display:flex;align-items:center;gap:10px;">'
    + '<div style="font-size:10px;color:#1D9E75;font-weight:500;">&#9679; LIVE</div>'
    + '<button class="btn-green" onclick="S.composing=true;render()">+ Post</button></div></div>'
    + '<div style="max-width:600px;margin:0 auto;padding:14px 12px 20px;">'
    + '<div style="margin-bottom:14px;">'
    + '<div style="font-size:15px;font-weight:500;color:#E8EDF5;">' + (titles[S.tab] || '') + '</div>'
    + '<div style="font-size:11px;color:#5F5E5A;margin-top:2px;">' + (subs[S.tab] || '') + '</div></div>'
    + content + '</div>'
    + nav + compose + '</div>';
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function setTab(t) { S.tab = t; render(); }
function setCat(c) { S.category = c; render(); }
function setAuthMode(m) { S.authMode = m; render(); }
function like(id) { S.liked[id] = !S.liked[id]; render(); }
function vote(id, v) { S.voted[id] = v; render(); }

function refresh() {
  loadFeed();
}

function loadFeed() {
  S.loading = true; render();
  fetch(API + '/api/v1/feed', {
    headers: S.token ? { 'Authorization': 'Bearer ' + S.token } : {}
  }).then(function(r) { return r.json(); })
  .then(function(d) {
    S.posts = d.posts && d.posts.length > 0 ? d.posts.map(normPost) : MOCK;
    S.loading = false; render();
  }).catch(function() { S.posts = MOCK; S.loading = false; render(); });
}

function doAuth() {
  var u = document.getElementById('un') && document.getElementById('un').value;
  var p = document.getElementById('pw') && document.getElementById('pw').value;
  if (!u) return;
  fetch(API + '/api/v1/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, email: u, password: p })
  }).then(function(r) { return r.json(); })
  .then(function(d) {
    S.token = d.token || 'demo';
    S.user = { username: (d.user && d.user.username) || u, tier: 'standard' };
    loadFeed();
  }).catch(function() {
    S.token = 'demo';
    S.user = { username: u || 'guest', tier: 'standard' };
    S.posts = MOCK;
    render();
  });
}

function logout() {
  S.user = null; S.token = null; S.posts = []; render();
}

function doPost() {
  var c = document.getElementById('cc') && document.getElementById('cc').value;
  if (!c || !c.trim()) return;
  fetch(API + '/api/v1/posts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.token },
    body: JSON.stringify({ content: c })
  }).catch(function() {}).then(function() {
    S.composing = false;
    loadFeed();
  });
}

function analyze() {
  var c = document.getElementById('sc') && document.getElementById('sc').value;
  if (!c || !c.trim()) return;
  S.shieldResult = null; render();
  setTimeout(function() {
    var score = Math.floor(Math.random() * 30) + 65;
    S.shieldResult = {
      score: score,
      reasoning: 'Content references verifiable public interest claims. Source credibility indicates legitimate reporting. No disinformation indicators detected.'
    };
    render();
  }, 1400);
}

// ── INIT ───────────────────────────────────────────────────────────────────
S.posts = MOCK;
render();

</script>
</body>
</html>
