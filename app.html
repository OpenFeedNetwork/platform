  var NAV=[{id:"feed",icon:"🏠",label:"Home"},{id:"shield",icon:"🛡",label:"Shield"},{id:"governance",icon:"🗳",label:"Vote"},{id:"profile",icon:"👤",label:"Profile"}];
  var content=state.tab==="feed"?renderFeed():state.tab==="shield"?renderShield():state.tab==="governance"?renderGovernance():'<div class="card" style="padding:20px;"><div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;"><div style="width:60px;height:60px;border-radius:50%;background:#1D9E7522;border:2px solid #1D9E7544;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:#1D9E75;">'+state.user.username.substring(0,2).toUpperCase()+'</div><div><div style="font-size:16px;font-weight:500;color:#E8EDF5;">@'+state.user.username+'</div><div style="font-size:12px;color:#1D9E75;margin-top:3px;">◆ '+(TIERS[state.user.tier]&&TIERS[state.user.tier].label||"Standard")+' Account</div></div></div><button onclick="setState({user:null})" style="width:100%;padding:13px;border-radius:20px;background:#E24B4A15;border:1px solid #E24B4A30;color:#E24B4A;font-weight:600;font-size:14px;cursor:pointer;font-family:DM Sans,sans-serif;">Sign Out</button></div>';
  return '<div style="min-height:100vh;background:#0C0F14;padding-bottom:80px;"><div style="position:sticky;top:0;z-index:50;background:#0C0F14EE;border-bottom:1px solid #1E2535;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;"><div style="font-size:20px;color:#E8EDF5;letter-spacing:0.5px;font-weight:300;">Candor <span style="color:#1D9E75;">◆</span></div><div style="display:flex;align-items:center;gap:10px;"><div style="font-size:10px;color:#1D9E75;font-weight:500;">● LIVE</div><button class="btn-green" onclick="setState({composing:true})">+ Post</button></div></div><div style="max-width:600px;margin:0 auto;padding:14px 12px 20px;"><div style="margin-bottom:14px;"><div style="font-size:15px;font-weight:500;color:#E8EDF5;">'+(state.tab==="feed"?"📡 Open Feed":state.tab==="shield"?"🛡 Truth Shield":state.tab==="governance"?"🗳 Governance":"👤 Profile")+'</div><div style="font-size:11px;color:#5F5E5A;margin-top:2px;">'+(state.tab==="feed"?"Anti-suppression · CANDOR scored · IPFS stored":state.tab==="shield"?"Real-time analysis · Immutable verdicts":state.tab==="governance"?"Community-controlled algorithm · On-chain votes":"@"+state.user.username+" account")+'</div></div>'+content+'</div><div style="position:fixed;bottom:0;left:0;right:0;background:#0C0F14EE;border-top:1px solid #1E2535;display:flex;z-index:50;">'+NAV.map(function(n){return '<button class="nav-btn '+(state.tab===n.id?"active":"")+'" onclick="setTab(''+n.id+'')"><span style="font-size:19px;">'+n.icon+'</span><span style="font-size:9px;font-weight:'+(state.tab===n.id?500:400)+';">'+n.label+'</span></button>';}).join("")+'</div>'+(state.composing?'<div style="position:fixed;inset:0;background:#000000CC;z-index:200;display:flex;align-items:flex-end;"><div style="width:100%;background:#13171F;border-radius:20px 20px 0 0;border:1px solid #1E2535;padding:20px;padding-bottom:40px;"><div style="display:flex;justify-content:space-between;margin-bottom:14px;"><div style="font-size:15px;font-weight:500;color:#E8EDF5;">New Post</div><button onclick="setState({composing:false})" style="background:none;border:none;color:#5F5E5A;font-size:20px;cursor:pointer;">✕</button></div><textarea id="compose-content" rows="5" placeholder="What is happening? Truth Shield will verify and protect your post..."></textarea><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;"><div style="font-size:11px;color:#2A3040;">🛡 Truth Shield · ◆ IPFS</div><button class="btn-green" onclick="doPost()">Post →</button></div></div></div>':'')+'</div>';}
function renderAuth(){return '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#0C0F14;"><div style="margin-bottom:36px;text-align:center;"><div style="font-size:36px;color:#E8EDF5;letter-spacing:1px;margin-bottom:6px;font-weight:300;">Candor</div><div style="font-size:11px;color:#4A5568;letter-spacing:3px;margin-bottom:12px;">THE OPEN FEED NETWORK</div><div style="font-size:12px;color:#1D9E75;background:#1D9E7515;border:1px solid #1D9E7530;border-radius:20px;padding:5px 14px;display:inline-block;">◆ Anti-suppression · Truth Shield · IPFS</div></div><div style="width:100%;max-width:380px;background:#13171F;border-radius:20px;border:1px solid #1E2535;padding:24px;"><div style="display:flex;gap:8px;margin-bottom:20px;"><button onclick="setState({authMode:'login'})" class="btn-outline '+(state.authMode!=="register"?"active":"")+'" style="flex:1;">Sign In</button><button onclick="setState({authMode:'register'})" class="btn-outline '+(state.authMode==="register"?"active":"")+'" style="flex:1;">Register</button></div><div style="margin-bottom:12px;"><div style="font-size:11px;color:#5F5E5A;margin-bottom:6px;">USERNAME</div><input id="auth-username" placeholder="your_username" onkeydown="if(event.key==='Enter')doAuth()" /></div><div style="margin-bottom:20px;"><div style="font-size:11px;color:#5F5E5A;margin-bottom:6px;">PASSWORD</div><input id="auth-password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" /></div><button class="btn-green" style="width:100%;padding:13px;border-radius:20px;font-size:14px;" onclick="doAuth()">Sign In →</button><div style="margin-top:16px;padding:10px 12px;background:#0C0F14;border-radius:10px;border:1px solid #1E2535;font-size:11px;color:#5F5E5A;line-height:1.8;">👤 Standard · 🎭 Anonymous · 🔒 Whistleblower</div></div></div>';}
function render(){document.getElementById("app").innerHTML=state.user?renderApp():renderAuth();}
function setState(u){Object.assign(state,u);render();}
function setTab(t){setState({tab:t});}
function setCategory(c){setState({category:c});}
function toggleLike(id){state.liked[id]=!state.liked[id];render();}
function castVote(id,v){state.voted[id]=v;render();}
function refreshFeed(){loadFeed(state.user&&state.user.token);}
async function loadFeed(token){
  setState({loading:true});
  try{var res=await fetch(API+"/api/v1/feed",{headers:token?{"Authorization":"Bearer "+token}:{}});var data=await res.json();setState({posts:data.posts&&data.posts.length>0?data.posts.map(norm):MOCK_POSTS,loading:false});}
  catch(e){setState({posts:MOCK_POSTS,loading:false});}
}
async function doAuth(){
  var u=document.getElementById("auth-username").value,p=document.getElementById("auth-password").value;
  if(!u||!p)return;
  try{var res=await fetch(API+"/api/v1/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,email:u,password:p})});var data=await res.json();if(data.token){setState({user:{token:data.token,username:data.user&&data.user.username||u,tier:"standard"}});loadFeed(data.token);return;}}catch(e){}
  setState({user:{token:"demo",username:u||"guest",tier:"standard"}});loadFeed("demo");
}
async function doPost(){
  var c=document.getElementById("compose-content").value;
  if(!c||!c.trim())return;
  try{await fetch(API+"/api/v1/posts",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+(state.user&&state.user.token)},body:JSON.stringify({content:c})});}catch(e){}
  setState({composing:false});loadFeed(state.user&&state.user.token);
}
async function runShield(){
  var c=document.getElementById("shield-content").value;
  if(!c||!c.trim())return;
  setState({shieldAnalyzing:true,shieldResult:null});render();
  await new Promise(function(r){setTimeout(r,1400);});
  var score=Math.floor(Math.random()*30)+65;
  setState({shieldAnalyzing:false,shieldResult:{score:score,reasoning:"Content references verifiable public interest claims. Source credibility and specificity indicate legitimate reporting. No disinformation indicators detected."}});
}
state.posts=MOCK_POSTS;
render();
</script>
</body>
</html>
