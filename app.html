<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candor: The Open Feed Network</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0C0F14;color:#E8EDF5;font-family:'DM Sans',sans-serif;}
.card{background:#13171F;border-radius:16px;border:1px solid #1E2535;margin-bottom:10px;overflow:hidden;}
.btn-green{background:#1D9E75;color:#0C0F14;border:none;border-radius:20px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-outline{background:transparent;border:1px solid #1E2535;border-radius:10px;padding:10px;color:#5F5E5A;font-family:'DM Sans',sans-serif;cursor:pointer;font-size:13px;}
.btn-outline.active{border-color:#1D9E75;color:#1D9E75;background:#1D9E7518;}
input{background:#0C0F14;border:1px solid #1E2535;border-radius:10px;padding:12px 14px;color:#E8EDF5;font-size:14px;width:100%;font-family:'DM Sans',sans-serif;outline:none;}
textarea{background:#0C0F14;border:1px solid #1E2535;border-radius:12px;padding:12px 14px;color:#E8EDF5;font-size:14px;width:100%;font-family:'DM Sans',sans-serif;outline:none;resize:none;line-height:1.65;}
.nav-btn{flex:1;padding:12px 6px;background:none;border:none;border-top:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#5F5E5A;font-family:'DM Sans',sans-serif;}
.nav-btn.active{border-top-color:#1D9E75;color:#1D9E75;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = "https://open-feed-platform.fly.dev";
let state = { user:null, tab:"feed", posts:[], loading:false, composing:false, liked:{}, category:"all" };

const MOCK_POSTS = [
  {id:"p1",username:"aisha_okafor",avatar:"AO",acolor:"#E24B4A",tier:"whistleblower",category:"Civil Rights",created_at:"3h ago",content:"Raw, unedited photo from today's permitted protest at the state capitol. Police deployed crowd dispersal on peaceful marchers. No filters, no edits — you deserve to see this.",media_type:"photo",candor_score:96,likes:7842,comments:1240,shares:5621,suppressed:true,platform_tried_suppress:true,ipfs_cid:"QmTs4Jkl012"},
  {id:"p2",username:"rafael_moreno",avatar:"RM",acolor:"#2ECC9A",tier:"anonymous",category:"Accountability",created_at:"6h ago",content:"47-minute full hearing footage — city officials caught on record approving rezoning without public notice. Key moment at 14:32 where the vote occurs.",media_type:"video",candor_score:93,video_duration:"47:13",key_moment:"14:32",likes:4100,comments:770,shares:3800,suppressed:false,platform_tried_suppress:false,ipfs_cid:"QmAv7Xyz789"},
  {id:"p3",username:"maria_chen",avatar:"MC",acolor:"#F09595",tier:"standard",category:"Environment",created_at:"2h ago",content:"After 8 months of FOIA requests, I obtained internal EPA documents showing three municipal water systems falsified lead testing results. Contamination was 4× the legal limit.",media_type:"text",candor_score:97,likes:5621,comments:892,shares:3200,suppressed:true,platform_tried_suppress:true,ipfs_cid:"QmTs1Abc123"},
  {id:"p4",username:"devon_williams",avatar:"DW",acolor:"#85B7EB",tier:"anonymous",category:"Housing",created_at:"4h ago",content:"City council voted 7-0 to rezone displacing 847 affordable housing units. 2,100+ residents affected. Zero local news coverage.",media_type:"text",candor_score:91,likes:2890,comments:445,shares:1900,suppressed:true,platform_tried_suppress:true,ipfs_cid:"QmTs2Def456"},
  {id:"p5",username:"sponsored_brand",avatar:"SP",acolor:"#888780",tier:"standard",category:"Sponsored",created_at:"1h ago",content:"Transform your life with our AI wellness program! Join 50,000+ happy customers. Limited time 70% off!",media_type:"text",candor_score:11,likes:32,comments:3,shares:8,suppressed:false,platform_tried_suppress:false,ipfs_cid:null},
  {id:"p6",username:"priya_nair",avatar:"PN",acolor:"#EF9F27",tier:"standard",category:"Health Policy",created_at:"8h ago",content:"Pharmaceutical lobbying disclosure filings show a 340% increase in spending targeting FDA advisory panel members. Documented public record.",media_type:"text",candor_score:89,likes:3200,comments:560,shares:2100,suppressed:false,platform_tried_suppress:false,ipfs_cid:"QmTs5Mno345"},
];

const TIERS = {standard:{icon:"👤",label:"Standard",color:"#85B7EB"},anonymous:{icon:"🎭",label:"Anonymous",color:"#1D9E75"},whistleblower:{icon:"🔒",label:"Whistleblower",color:"#AFA9EC"}};
const CATS = [{id:"all",icon:"🔥",label:"All"},{id:"photo",icon:"📷",label:"Photo"},{id:"video",icon:"🎥",label:"Video"},{id:"environment",icon:"💧",label:"Environ"},{id:"housing",icon:"🏠",label:"Housing"},{id:"rights",icon:"⚖️",label:"Rights"}];

function candorColor(s){return s>=75?"#1D9E75":s>=45?"#EF9F27":"#E24B4A";}

function candorRing(score,size=52){
  const r=22,circ=2*Math.PI*r,offset=circ-(score/100)*circ,c=candorColor(score);
  return `<svg width="${size}" height="${size}" viewBox="0 0 52 52">
    <circle cx="26" cy="26" r="${r}" fill="none" stroke="#1E2535" stroke-width="3"/>
    <circle cx="26" cy="26" r="${r}" fill="none" stroke="${c}" stroke-width="3" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 26 26)"/>
    <text x="26" y="22" text-anchor="middle" fill="${c}" font-size="13" font-weight="500" font-family="monospace">${score}</text>
    <text x="26" y="33" text-anchor="middle" fill="${c}" font-size="6.5" font-weight="500" font-family="monospace" letter-spacing="0.5">CANDOR</text>
  </svg>`;
}

function renderPost(post){
  const t=TIERS[post.tier]||TIERS.standard;
  const c=candorColor(post.candor_score);
  const verdict=post.candor_score>=75?"Legitimate":post.candor_score>=45?"Unverified":"Low CANDOR";
  const isLow=post.candor_score<45;
  const liked=!!state.liked[post.id];

  let mediaHtml="";
  if(post.media_type==="photo"){
    mediaHtml=`<div style="position:relative;height:200px;background:#111820;overflow:hidden;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:60px;opacity:0.1">📷</span>
      <div style="position:absolute;top:10px;left:10px;background:#185FA530;border:1px solid #185FA550;border-radius:20px;padding:3px 10px;font-size:10px;color:#85B7EB;font-weight:500;">📷 Photo</div>
      ${post.suppressed?'<div style="position:absolute;top:10px;right:10px;background:#BA751525;border:1px solid #BA751545;border-radius:20px;padding:3px 8px;font-size:10px;color:#EF9F27;font-weight:500;">Restored</div>':""}
      <div style="position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:#0C0F14CC;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">${candorRing(post.candor_score)}<div><div style="font-size:11px;color:${c};font-weight:500;">${verdict}</div><div style="font-size:10px;color:#5F5E5A;">Truth Shield verified</div></div></div>
        <div style="display:flex;align-items:center;gap:4px;background:${c}15;border:1px solid ${c}30;border-radius:20px;padding:5px 10px;font-size:10px;color:${c};font-weight:500;">🛡 Protected</div>
      </div>
    </div>`;
  } else if(post.media_type==="video"){
    mediaHtml=`<div style="position:relative;height:200px;background:#0e1218;overflow:hidden;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:60px;opacity:0.1">🎥</span>
      <div style="position:absolute;width:58px;height:58px;border-radius:50%;background:#0C0F14CC;border:2px solid #E8EDF520;display:flex;align-items:center;justify-content:center;font-size:24px;padding-left:4px;">▶</div>
      <div style="position:absolute;top:10px;left:10px;background:#A32D2D;border-radius:4px;padding:3px 10px;font-size:10px;color:#FCEBEB;font-weight:500;">● VIDEO</div>
      <div style="position:absolute;top:10px;right:10px;background:#0C0F14AA;border-radius:4px;padding:2px 8px;font-size:10px;color:#B4B2A9;font-family:monospace;">${post.video_duration||""}</div>
      <div style="position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:#0C0F14CC;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">${candorRing(post.candor_score)}<div><div style="font-size:11px;color:${c};font-weight:500;">${verdict}</div><div style="font-size:10px;color:#5F5E5A;">Truth Shield verified</div>${post.key_moment?`<div style="font-size:10px;color:#EF9F27;">Key: ${post.key_moment}</div>`:""}</div></div>
        <div style="display:flex;align-items:center;gap:4px;background:${c}15;border:1px solid ${c}30;border-radius:20px;padding:5px 10px;font-size:10px;color:${c};font-weight:500;">🛡 Protected</div>
      </div>
    </div>`;
  } else {
    mediaHtml=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${c}08;border-top:1px solid #1E2535;border-bottom:1px solid #1E2535;">
      ${candorRing(post.candor_score,44)}
      <div style="flex:1"><div style="font-size:11px;color:${c};font-weight:500;">${verdict} · Truth Shield</div><div style="height:4px;background:#1E2535;border-radius:2px;margin-top:5px;overflow:hidden;"><div style="height:4px;width:${post.candor_score}%;background:${c};border-radius:2px;"></div></div></div>
      <span style="font-size:18px;">🛡</span>
    </div>`;
  }

  return `<div class="card" style="animation:fadeUp 0.3s ease both;${isLow?"opacity:0.75;":""}${isLow?"border-color:#E24B4A20;":""}">
    <div style="display:flex;align-items:center;gap:8px;padding:12px 12px 8px;">
      <div style="width:34px;height:34px;border-radius:50%;background:${post.acolor}22;border:1.5px solid ${post.acolor}44;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:${post.acolor};flex-shrink:0;">${post.avatar}</div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:500;color:#E8EDF5;">@${post.username}</div><div style="font-size:10px;color:#5F5E5A;">${post.created_at} · ${post.category}</div></div>
      <div style="display:flex;align-items:center;gap:4px;background:${t.color}18;border:1px solid ${t.color}30;border-radius:20px;padding:3px 8px;font-size:10px;color:${t.color};font-weight:500;">${t.icon} ${t.label}</div>
    </div>
    <p style="font-size:13px;color:${isLow?"#888780":"#B4B2A9"};line-height:1.65;margin:0;padding:0 12px 10px;">${post.content}</p>
    ${mediaHtml}
    ${isLow?`<div style="padding:8px 12px;background:#E24B4A08;border-top:1px solid #E24B4A15;font-size:10px;color:#F09595;line-height:1.5;">Context: ${post.candor_score<20?"Promotional content — not independently verified.":"Unverified claims."} Low CANDOR score.</div>`:""}
    ${post.platform_tried_suppress?'<div style="padding:6px 12px;background:#BA751508;border-top:1px solid #BA751520;font-size:10px;color:#EF9F27;">⚠️ Platform suppressed this — Truth Shield reviewed and restored it</div>':""}
    ${post.ipfs_cid?`<div style="padding:4px 12px;font-size:10px;color:#2A3040;font-family:monospace;">IPFS: ${post.ipfs_cid.substring(0,14)}…</div>`:""}
    <div style="display:flex;gap:16px;padding:8px 12px 12px;border-top:1px solid #1E2535;">
      <button onclick="toggleLike('${post.id}')" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:${liked?"#E24B4A":"#5F5E5A"};font-size:13px;font-family:'DM Sans',sans-serif;">${liked?"♥":"♡"} ${(post.likes+(liked?1:0)).toLocaleString()}</button>
      <button style="background:none;border:none;cursor:pointer;color:#5F5E5A;font-size:13px;font-family:'DM Sans',sans-serif;">💬 ${post.comments.toLocaleString()}</button>
      <button style="background:none;border:none;cursor:pointer;color:#5F5E5A;font-size:13px;font-family:'DM Sans',sans-serif;">↗ ${post.shares.toLocaleString()}</button>
      ${post.media_type==="video"?'<button style="margin-left:auto;background:none;border:none;cursor:pointer;color:#1D9E75;font-size:12px;font-weight:500;font-family:\'DM Sans\',sans-serif;">▶ Watch</button>':""}
      ${post.media_type==="photo"?'<button style="margin-left:auto;background:none;border:none;cursor:pointer;color:#5F5E5A;font-size:12px;font-family:\'DM Sans\',sans-serif;">⬇ Save</button>':""}
    </div>
  </div>`;
}

function renderFeed(){
  const filtered=state.category==="all"?state.posts:state.posts.filter(p=>p.media_type===state.category||p.category?.toLowerCase().includes(state.category));
  const suppressed=state.posts.filter(p=>p.platform_tried_suppress).length;
  return `
    <div style="padding:10px 0 8px;display:flex;gap:10px;overflow-x:auto;margin-bottom:8px;">
      ${CATS.map(c=>`<div onclick="setCategory('${c.id}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;">
        <div style="width:48px;height:48px;border-radius:50%;border:2px solid ${state.category===c.id?"#1D9E75":"#1E2535"};display:flex;align-items:center;justify-content:center;background:${state.category===c.id?"#0F6E5620":"#13171F"};font-size:20px;">${c.icon}</div>
        <div style="font-size:9px;color:${state.category===c.id?"#1D9E75":"#5F5E5A"};font-weight:${state.category===c.id?500:400};">${c.label}</div>
      </div>`).join("")}
    </div>
    <div style="background:#0F6E5610;border:1px solid #1D9E7525;border-radius:10px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="loadFeed()">
      <div style="font-size:11px;color:#1D9E75;font-weight:500;">↻ Tap to refresh feed</div>
      <div style="font-size:10px;color:#0F6E56;font-weight:500;">Load</div>
    </div>
    ${suppressed>0?`<div style="background:#BA751510;border:1px solid #BA751525;border-radius:10px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:11px;font-weight:500;color:#EF9F27;">⚠️ ${suppressed} posts restored by Truth Shield</div><div style="font-size:10px;color:#5F5E5A;margin-top:1px;">Suppressed on other platforms — visible here</div></div>
      <div style="font-size:10px;color:#1D9E75;font-weight:500;">All visible</div>
    </div>`:""}
    ${state.loading?"<div style='text-align:center;padding:40px;color:#5F5E5A;font-size:13px;'>Loading feed…</div>":filtered.map(p=>renderPost(p)).join("")}
  `;
}

function renderAuth(){
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#0C0F14;">
    <div style="margin-bottom:36px;text-align:center;">
      <div style="font-size:36px;color:#E8EDF5;letter-spacing:1px;margin-bottom:6px;font-weight:300;">Candor</div>
      <div style="font-size:11px;color:#4A5568;letter-spacing:3px;margin-bottom:12px;">THE OPEN FEED NETWORK</div>
      <div style="font-size:12px;color:#1D9E75;background:#1D9E7515;border:1px solid #1D9E7530;border-radius:20px;padding:5px 14px;display:inline-block;">◆ Anti-suppression · Truth Shield · IPFS</div>
    </div>
    <div style="width:100%;max-width:380px;background:#13171F;border-radius:20px;border:1px solid #1E2535;padding:24px;">
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button onclick="setAuthMode('login')" class="btn-outline ${state.authMode!=='register'?'active':''}" style="flex:1;">Sign In</button>
        <button onclick="setAuthMode('register')" class="btn-outline ${state.authMode==='register'?'active':''}" style="flex:1;">Register</button>
      </div>
      <div style="margin-bottom:12px;"><div style="font-size:11px;color:#5F5E5A;margin-bottom:6px;">USERNAME</div><input id="auth-username" placeholder="your_username" /></div>
      <div style="margin-bottom:20px;"><div style="font-size:11px;color:#5F5E5A;margin-bottom:6px;">PASSWORD</div><input id="auth-password" type="password" placeholder="••••••••" /></div>
      <button class="btn-green" style="width:100%;padding:13px;border-radius:20px;font-size:14px;" onclick="doAuth()">Sign In →</button>
      <div style="margin-top:16px;padding:10px 12px;background:#0C0F14;border-radius:10px;border:1px solid #1E2535;font-size:11px;color:#5F5E5A;line-height:1.8;">👤 Standard · 🎭 Anonymous · 🔒 Whistleblower</div>
    </div>
  </div>`;
}

function renderCompose(){
  return `<div style="position:fixed;inset:0;background:#000000CC;z-index:200;display:flex;align-items:flex-end;">
    <div style="width:100%;background:#13171F;border-radius:20px 20px 0 0;border:1px solid #1E2535;padding:20px;padding-bottom:40px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px;">
        <div style="font-size:15px;font-weight:500;color:#E8EDF5;">New Post</div>
        <button onclick="setState({composing:false})" style="background:none;border:none;color:#5F5E5A;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <textarea id="compose-content" rows="5" placeholder="What's happening? Truth Shield will verify and protect your post…"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">
        <div style="font-size:11px;color:#2A3040;">🛡 Truth Shield · ◆ IPFS</div>
        <button class="btn-green" onclick="doPost()">Post →</button>
      </div>
    </div>
  </div>`;
}

function renderApp(){
  const NAV=[{id:"feed",icon:"🏠",label:"Home"},{id:"shield",icon:"🛡",label:"Shield"},{id:"governance",icon:"🗳",label:"Vote"},{id:"profile",icon:"👤",label:"Profile"}];
  let content="";
  if(state.tab==="feed") content=renderFeed();
  else if(state.tab==="shield") content=`<div style="text-align:center;padding:60px;color:#5F5E5A;"><div style="font-size:40px;margin-bottom:12px;">🛡</div><div style="font-size:15px;font-weight:500;color:#E8EDF5;margin-bottom:6px;">Truth Shield</div><div style="font-size:13px;">Real-time analysis coming soon</div></div>`;
  else if(state.tab==="governance") content=`<div style="text-align:center;padding:60px;color:#5F5E5A;"><div style="font-size:40px;margin-bottom:12px;">🗳</div><div style="font-size:15px;font-weight:500;color:#E8EDF5;margin-bottom:6px;">Governance</div><div style="font-size:13px;">Community voting coming soon</div></div>`;
  else content=`<div class="card" style="padding:20px;"><div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;"><div style="width:60px;height:60px;border-radius:50%;background:#1D9E7522;border:2px solid #1D9E7544;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;color:#1D9E75;">${state.user.username.substring(0,2).toUpperCase()}</div><div><div style="font-size:16px;font-weight:500;color:#E8EDF5;">@${state.user.username}</div><div style="font-size:12px;color:#1D9E75;margin-top:3px;">◆ ${TIERS[state.user.tier]?.label} Account</div></div></div><button onclick="setState({user:null})" style="width:100%;padding:13px;border-radius:20px;background:#E24B4A15;border:1px solid #E24B4A30;color:#E24B4A;font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">Sign Out</button></div>`;

  return `<div style="min-height:100vh;background:#0C0F14;padding-bottom:80px;">
    <div style="position:sticky;top:0;z-index:50;background:#0C0F14EE;border-bottom:1px solid #1E2535;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:20px;color:#E8EDF5;letter-spacing:0.5px;font-weight:300;">Candor <span style="color:#1D9E75;">◆</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="font-size:10px;color:#1D9E75;font-weight:500;">● LIVE</div>
        <button class="btn-green" onclick="setState({composing:true})">+ Post</button>
      </div>
    </div>
    <div style="max-width:600px;margin:0 auto;padding:14px 12px 20px;">
      <div style="margin-bottom:14px;">
        <div style="font-size:15px;font-weight:500;color:#E8EDF5;">${state.tab==="feed"?"📡 Open Feed":state.tab==="shield"?"🛡 Truth Shield":state.tab==="governance"?"🗳 Governance":"👤 Profile"}</div>
        <div style="font-size:11px;color:#5F5E5A;margin-top:2px;">${state.tab==="feed"?"Anti-suppression · CANDOR scored · IPFS stored":state.tab==="profile"?`@${state.user.username} · ${TIERS[state.user.tier]?.label} account`:""}</div>
      </div>
      ${content}
    </div>
    <div style="position:fixed;bottom:0;left:0;right:0;background:#0C0F14EE;border-top:1px solid #1E2535;display:flex;z-index:50;">
      ${NAV.map(n=>`<button class="nav-btn ${state.tab===n.id?"active":""}" onclick="setTab('${n.id}')"><span style="font-size:19px;">${n.icon}</span><span style="font-size:9px;font-weight:${state.tab===n.id?500:400};">${n.label}</span></button>`).join("")}
    </div>
    ${state.composing?renderCompose():""}
  </div>`;
}

function render(){
  document.getElementById("app").innerHTML = state.user ? renderApp() : renderAuth();
}

function setState(updates){
  Object.assign(state, updates);
  render();
}

function setTab(t){ setState({tab:t}); }
function setCategory(c){ setState({category:c}); }
function setAuthMode(m){ setState({authMode:m}); }
function toggleLike(id){ state.liked[id]=!state.liked[id]; render(); }

async function loadFeed(){
  setState({loading:true});
  try{
    const res=await fetch(`${API}/api/v1/feed`,{headers:state.user?.token?{"Authorization":`Bearer ${state.user.token}`}:{}});
    const data=await res.json();
    setState({posts:data.posts?.length>0?data.posts:MOCK_POSTS,loading:false});
  }catch(e){ setState({posts:MOCK_POSTS,loading:false}); }
}

async function doAuth(){
  const username=document.getElementById("auth-username").value;
  const password=document.getElementById("auth-password").value;
  try{
    const res=await fetch(`${API}/api/v1/auth/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,email:username,password})});
    const data=await res.json();
    if(data.token){ setState({user:{token:data.token,username:data.user?.username||username,tier:"standard"}}); loadFeed(); return; }
  }catch(e){}
  setState({user:{token:"demo",username:username||"guest",tier:"standard"}});
  loadFeed();
}

async function doPost(){
  const content=document.getElementById("compose-content").value;
  if(!content.trim())return;
  try{ await fetch(`${API}/api/v1/posts`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${state.user?.token}`},body:JSON.stringify({content})}); }catch(e){}
  setState({composing:false});
  loadFeed();
}

state.posts = MOCK_POSTS;
state.authMode = "login";
render();
</script>
</body>
</html>
