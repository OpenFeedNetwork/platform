function candorColor(s){ return s>=75?"#1D9E75":s>=45?"#EF9F27":"#E24B4A"; }
function CandorRing({ score, size=52 }) {

  );
}

function ComposeModal({ onClose, token, onPosted }) {

              <div style={{ fontSize:11, color:"#2A3040" }}>🛡 Truth Shield · ◆ IPFS</div>
              <button onClick={post} disabled={!content.trim()||posting} style={{ padding:"10px 24px", borderRadius:20, background:!content.trim()?"#1E2535":"#1D9E75", border:"none", color:!content.trim()?"#5F5E5A":"#0C0F14", fontWeight:600, fontSize:13, cursor:!content.trim()?"not-allowed":"pointer" }}>{posting?"Posting…":"Post →"}</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}
function AuthScreen({ onAuth }) {
  const [mode, setMode]=useState("login"); const [tier, setTier]=useState("standard"); const [username, setUsername]=useState(""); const [password, setPassword]=useState(""); const [loading, setLoading]=useState(false);
  const submit=async()=>{ setLoading(true); try{ const res=await fetch(`${API}/api/v1/auth/${mode}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,email:username,password,tier})}); const data=await res.json(); if(data.token){onAuth({token:data.token,username:data.user?.username||username,tier});return;} }catch(e){} onAuth({token:"demo",username:username||"guest",tier}); setLoading(false); };
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, background:"#0C0F14" }}>
      <div style={{ marginBottom:36, textAlign:"center" }}>
        <div style={{ fontSize:36, fontFamily:"'DM Serif Display',serif", color:"#E8EDF5", letterSpacing:1, marginBottom:6 }}>Candor</div>
        <div style={{ fontSize:11, color:"#4A5568", letterSpacing:3, marginBottom:12 }}>THE OPEN FEED NETWORK</div>
        <div style={{ fontSize:12, color:"#1D9E75", background:"#1D9E7515", border:"0.5px solid #1D9E7530", borderRadius:20, padding:"5px 14px", display:"inline-block" }}>◆ Anti-suppression · Truth Shield · IPFS</div>
      </div>
      <div style={{ width:"100%", maxWidth:380, background:"#13171F", borderRadius:20, border:"0.5px solid #1E2535", padding:24 }}>
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          {["login","register"].map(m=><button key={m} onClick={()=>setMode(m)} style={{ flex:1, padding:"10px", borderRadius:10, border:`0.5px solid ${mode===m?"#1D9E75":"#1E2535"}`, background:mode===m?"#1D9E7518":"transparent", color:mode===m?"#1D9E75":"#5F5E5A", fontWeight:500, fontSize:13, cursor:"pointer" }}>{m==="login"?"Sign In":"Register"}</button>)}
        </div>
        {mode==="register"&&<div style={{ marginBottom:14 }}><div style={{ fontSize:11, color:"#5F5E5A", marginBottom:8 }}>ACCOUNT TIER</div><div style={{ display:"flex", flexDirection:"column", gap:6 }}>{Object.entries(TIER_META).map(([key,m])=><button key={key} onClick={()=>setTier(key)} style={{ padding:"10px 12px", borderRadius:10, cursor:"pointer", textAlign:"left", border:`0.5px solid ${tier===key?m.color:"#1E2535"}`, background:tier===key?`${m.color}12`:"transparent", display:"flex", alignItems:"center", gap:10 }}><span style={{ fontSize:18 }}>{m.icon}</span><div><div style={{ fontSize:12, fontWeight:500, color:tier===key?m.color:"#E8EDF5" }}>{m.label}</div><div style={{ fontSize:10, color:"#5F5E5A", marginTop:1 }}>{key==="standard"?"Username only":key==="anonymous"?"Zero PII stored":"E2E encrypted"}</div></div>{tier===key&&<span style={{ marginLeft:"auto", color:m.color }}>✓</span>}</button>)}</div></div>}
        <div style={{ marginBottom:12 }}><div style={{ fontSize:11, color:"#5F5E5A", marginBottom:6 }}>USERNAME</div><input value={username} onChange={e=>setUsername(e.target.value)} placeholder="your_username" onKeyDown={e=>e.key==="Enter"&&submit()} style={{ width:"100%", background:"#0C0F14", border:"0.5px solid #1E2535", borderRadius:10, padding:"12px 14px", color:"#E8EDF5", fontSize:14 }} /></div>
        <div style={{ marginBottom:20 }}><div style={{ fontSize:11, color:"#5F5E5A", marginBottom:6 }}>PASSWORD</div><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()} style={{ width:"100%", background:"#0C0F14", border:"0.5px solid #1E2535", borderRadius:10, padding:"12px 14px", color:"#E8EDF5", fontSize:14 }} /></div>
        <button onClick={submit} disabled={loading} style={{ width:"100%", padding:"13px", borderRadius:20, background:loading?"#1E2535":"#1D9E75", border:"none", color:loading?"#5F5E5A":"#0C0F14", fontWeight:600, fontSize:14, cursor:loading?"not-allowed":"pointer" }}>{loading?"Connecting…":mode==="login"?"Sign In →":"Create Account →"}</button>
      </div>
    </div>
  );
}
function FeedView({ token, posts, loading, onRefresh }) {
  const [liked, setLiked]=useState({}); const [activeCategory, setActiveCategory]=useState("all"); const [showRefresh, setShowRefresh]=useState(true);
  const toggleLike=(id)=>setLiked(l=>({...l,[id]:!l[id]}));
  const filtered=activeCategory==="all"?posts:posts.filter(p=>p.category?.toLowerCase().includes(activeCategory)||p.media_type===activeCategory);
  const suppressed=posts.filter(p=>p.platform_tried_suppress).length;
  return (
    <div>
      <div style={{ padding:"10px 0 8px", display:"flex", gap:10, overflowX:"auto", marginBottom:2 }}>
        {CATEGORIES.map(c=>(
          <div key={c.id} onClick={()=>setActiveCategory(c.id)} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, flexShrink:0, cursor:"pointer" }}>
            <div style={{ width:48, height:48, borderRadius:"50%", border:`2px solid ${activeCategory===c.id?"#1D9E75":"#1E2535"}`, display:"flex", alignItems:"center", justifyContent:"center", background:activeCategory===c.id?"#0F6E5620":"#13171F", fontSize:20 }}>{c.icon}</div>
            <div style={{ fontSize:9, color:activeCategory===c.id?"#1D9E75":"#5F5E5A", fontWeight:activeCategory===c.id?500:400 }}>{c.label}</div>
          </div>
        ))}
      </div>
      {showRefresh&&<div onClick={()=>{setShowRefresh(false);onRefresh();}} style={{ background:"#0F6E5610", border:"0.5px solid #1D9E7525", borderRadius:10, padding:"8px 14px", marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }}><div style={{ fontSize:11, color:"#1D9E75", fontWeight:500 }}>↻ Feed updated — tap to load latest</div><div style={{ fontSize:10, color:"#0F6E56", fontWeight:500 }}>Load</div></div>}
      {suppressed>0&&<div style={{ background:"#BA751510", border:"0.5px solid #BA751525", borderRadius:10, padding:"8px 14px", marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center" }}><div><div style={{ fontSize:11, fontWeight:500, color:"#EF9F27" }}>⚠️ {suppressed} posts restored by Truth Shield</div><div style={{ fontSize:10, color:"#5F5E5A", marginTop:1 }}>Suppressed on other platforms — visible here</div></div><div style={{ fontSize:10, color:"#1D9E75", fontWeight:500 }}>All visible</div></div>}
      {loading?<div style={{ textAlign:"center", padding:40, color:"#5F5E5A", fontSize:13 }}>Loading feed…</div>:filtered.length===0?<div style={{ background:"#13171F", borderRadius:16, border:"0.5px solid #1D9E7530", padding:24, textAlign:"center" }}><div style={{ fontSize:40, marginBottom:12 }}>✏️</div><div style={{ fontSize:14, fontWeight:500, color:"#E8EDF5", marginBottom:6 }}>Be the first to post</div><div style={{ fontSize:12, color:"#5F5E5A", lineHeight:1.6 }}>Share what others are afraid to say.</div></div>:filtered.map(p=><PostCard key={p.id} post={p} onLike={toggleLike} liked={!!liked[p.id]} />)}
    </div>
  );
}
function App() {
  const [user, setUser]=useState(null); const [tab, setTab]=useState("feed"); const [posts, setPosts]=useState(MOCK_POSTS); const [loading, setLoading]=useState(false); const [composing, setComposing]=useState(false);
  const loadFeed=useCallback(async(token)=>{ setLoading(true); try{ const res=await fetch(`${API}/api/v1/feed`,{headers:token?{"Authorization":`Bearer ${token}`}:{}}); const data=await res.json(); if(data.posts?.length>0)setPosts(data.posts); else setPosts(MOCK_POSTS); }catch(e){setPosts(MOCK_POSTS);} setLoading(false); },[]);
  const onAuth=(u)=>{setUser(u);loadFeed(u.token);};
  if(!user)return <AuthScreen onAuth={onAuth} />;
  const NAV=[{id:"feed",icon:"🏠",label:"Home"},{id:"shield",icon:"🛡",label:"Shield"},{id:"governance",icon:"🗳",label:"Vote"},{id:"profile",icon:"👤",label:"Profile"}];
  return (
    <div style={{ minHeight:"100vh", background:"#0C0F14", paddingBottom:80 }}>
      <div style={{ position:"sticky", top:0, zIndex:50, background:"#0C0F14EE", backdropFilter:"blur(12px)", borderBottom:"0.5px solid #1E2535", padding:"13px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontSize:20, fontFamily:"'DM Serif Display',serif", color:"#E8EDF5", letterSpacing:0.5 }}>Candor <span style={{ color:"#1D9E75" }}>◆</span></div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ fontSize:10, color:"#1D9E75", fontWeight:500 }}>● LIVE</div>
          <button onClick={()=>setComposing(true)} style={{ padding:"8px 16px", borderRadius:20, background:"#1D9E75", border:"none", color:"#0C0F14", fontWeight:600, fontSize:13, cursor:"pointer" }}>+ Post</button>
        </div>
      </div>
      <div style={{ maxWidth:600, margin:"0 auto", padding:"14px 12px 20px" }}>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:15, fontWeight:500, color:"#E8EDF5" }}>{tab==="feed"&&"📡 Open Feed"}{tab==="shield"&&"🛡 Truth Shield"}{tab==="governance"&&"🗳 Governance"}{tab==="profile"&&"👤 Profile"}</div>
          <div style={{ fontSize:11, color:"#5F5E5A", marginTop:2 }}>{tab==="feed"&&"Anti-suppression · CANDOR scored · IPFS stored"}{tab==="shield"&&"Real-time disinformation analysis · Immutable verdicts"}{tab==="governance"&&"Community-controlled algorithm · On-chain votes"}{tab==="profile"&&`@${user.username} · ${TIER_META[user.tier]?.label} account`}</div>
        </div>
        {tab==="feed"&&<FeedView token={user.token} posts={posts} loading={loading} onRefresh={()=>loadFeed(user.token)} />}
        {tab==="shield"&&<div style={{ textAlign:"center", padding:60, color:"#5F5E5A" }}><div style={{ fontSize:40, marginBottom:12 }}>🛡</div><div style={{ fontSize:15, fontWeight:500, color:"#E8EDF5", marginBottom:6 }}>Truth Shield</div><div style={{ fontSize:13 }}>Real-time analysis coming soon</div></div>}
        {tab==="governance"&&<div style={{ textAlign:"center", padding:60, color:"#5F5E5A" }}><div style={{ fontSize:40, marginBottom:12 }}>🗳</div><div style={{ fontSize:15, fontWeight:500, color:"#E8EDF5", marginBottom:6 }}>Governance</div><div style={{ fontSize:13 }}>Community voting coming soon</div></div>}
        {tab==="profile"&&<div style={{ background:"#13171F", borderRadius:16, border:"0.5px solid #1E2535", padding:20 }}><div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:20 }}><div style={{ width:60, height:60, borderRadius:"50%", background:"#1D9E7522", border:"2px solid #1D9E7544", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, fontWeight:500, color:"#1D9E75" }}>{user.username.substring(0,2).toUpperCase()}</div><div><div style={{ fontSize:16, fontWeight:500, color:"#E8EDF5" }}>@{user.username}</div><div style={{ fontSize:12, color:"#1D9E75", marginTop:3 }}>◆ {TIER_META[user.tier]?.label} Account</div></div></div><button onClick={()=>setUser(null)} style={{ width:"100%", padding:"13px", borderRadius:20, background:"#E24B4A15", border:"0.5px solid #E24B4A30", color:"#E24B4A", fontWeight:600, fontSize:14, cursor:"pointer" }}>Sign Out</button></div>}
      </div>
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#0C0F14EE", backdropFilter:"blur(12px)", borderTop:"0.5px solid #1E2535", display:"flex", zIndex:50 }}>
        {NAV.map(n=><button key={n.id} onClick={()=>setTab(n.id)} style={{ flex:1, padding:"12px 6px", background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, borderTop:tab===n.id?"2px solid #1D9E75":"2px solid transparent", color:tab===n.id?"#1D9E75":"#5F5E5A" }}><span style={{ fontSize:19 }}>{n.icon}</span><span style={{ fontSize:9, fontWeight:tab===n.id?500:400 }}>{n.label}</span></button>)}
      </div>
      {composing&&<ComposeModal token={user.token} onClose={()=>setComposing(false)} onPosted={()=>loadFeed(user.token)} />}
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
