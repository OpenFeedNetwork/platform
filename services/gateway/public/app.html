};

function candorColor(score) {
  if (score >= 75) return "#1D9E75";
  if (score >= 45) return "#EF9F27";
  return "#E24B4A";
}

function candorTrack(score) {
  const r = 22;
  const circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  return { circ, offset };
}

function CandorRing({ score, size=52 }) {
  const color = candorColor(score);
  const r = 22;
  const { circ, offset } = candorTrack(score);
  return (
    <svg width={size} height={size} viewBox="0 0 52 52">
      <circle cx="26" cy="26" r={r} fill="none" stroke="#1E2535" strokeWidth="3"/>
      <circle cx="26" cy="26" r={r} fill="none" stroke={color} strokeWidth="3"
        strokeDasharray={circ} strokeDashoffset={offset}
        strokeLinecap="round" transform="rotate(-90 26 26)"/>
      <text x="26" y="22" textAnchor="middle" fill={color} fontSize="13" fontWeight="500" fontFamily="monospace">{score}</text>
      <text x="26" y="33" textAnchor="middle" fill={color} fontSize="6.5" fontWeight="500" fontFamily="monospace" letterSpacing="0.5">CANDOR</text>
    </svg>
  );
}

  );
}

function ComposeModal({ onClose, token, onPosted }) {
  const [content, setContent] = useState("");
  const [tier, setTier] = useState("standard");
  const [posting, setPosting] = useState(false);
  const [done, setDone] = useState(false);

  const post = async () => {
    if (!content.trim()) return;
    setPosting(true);
    try {
      await fetch(`${API}/api/v1/posts`, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`},
        body: JSON.stringify({ content: content.trim(), tier })
      });
    } catch(e) {}
    setDone(true);
    setTimeout(()=>{ onPosted(); onClose(); }, 1200);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"#000000CC", zIndex:200, display:"flex", alignItems:"flex-end" }}>
      <div style={{ width:"100%", background:"#13171F", borderRadius:"20px 20px 0 0", border:"0.5px solid #1E2535", padding:20, paddingBottom:40, animation:"slideDown 0.2s ease" }}>
        {done ? (
          <div style={{ textAlign:"center", padding:"20px 0" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>✓</div>
            <div style={{ fontSize:14, fontWeight:500, color:"#1D9E75" }}>Post published</div>
            <div style={{ fontSize:11, color:"#5F5E5A", marginTop:4 }}>Stored on IPFS · Truth Shield queued · Feed ranked</div>
          </div>
        ) : (
          <>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:14 }}>
              <div style={{ fontSize:15, fontWeight:500, color:"#E8EDF5" }}>New Post</div>
              <button onClick={onClose} style={{ background:"none", border:"none", color:"#5F5E5A", fontSize:20, cursor:"pointer" }}>✕</button>
            </div>

            <div style={{ display:"flex", gap:6, marginBottom:14 }}>
              {Object.entries(TIER_META).map(([key,m])=>(
                <button key={key} onClick={()=>setTier(key)} style={{
                  flex:1, padding:"7px 4px", borderRadius:10,
                  border:`0.5px solid ${tier===key ? m.color : "#1E2535"}`,
                  background: tier===key ? `${m.color}18` : "transparent",
                  color: tier===key ? m.color : "#5F5E5A",
                  fontWeight:500, fontSize:11, cursor:"pointer"
                }}>
                  {m.icon} {m.label}
                </button>
              ))}
            </div>

            <textarea value={content} onChange={e=>setContent(e.target.value)}
              placeholder="What's happening? Truth Shield will verify and protect your post…"
              rows={5} style={{
                width:"100%", background:"#0C0F14", border:"0.5px solid #1E2535",
                borderRadius:12, padding:"12px 14px", color:"#E8EDF5",
                fontSize:14, resize:"none", lineHeight:1.65
              }} />

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:12 }}>
              <div style={{ fontSize:11, color:"#2A3040" }}>🛡 Truth Shield · ◆ IPFS · {content.length}/10000</div>
              <button onClick={post} disabled={!content.trim() || posting} style={{
                padding:"10px 24px", borderRadius:20,
                background: !content.trim() ? "#1E2535" : "#1D9E75",
                border:"none", color: !content.trim() ? "#5F5E5A" : "#0C0F14",
                fontWeight:600, fontSize:13, cursor: !content.trim() ? "not-allowed" : "pointer"
              }}>
                {posting ? "Posting…" : "Post →"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

          <input value={username} onChange={e=>setUsername(e.target.value)}
            placeholder="your_username" onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{ width:"100%", background:"#0C0F14", border:"0.5px solid #1E2535", borderRadius:10, padding:"12px 14px", color:"#E8EDF5", fontSize:14 }} />
        </div>

        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:11, color:"#5F5E5A", marginBottom:6 }}>PASSWORD</div>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
            placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{ width:"100%", background:"#0C0F14", border:"0.5px solid #1E2535", borderRadius:10, padding:"12px 14px", color:"#E8EDF5", fontSize:14 }} />
        </div>

        <button onClick={submit} disabled={loading} style={{
          width:"100%", padding:"13px", borderRadius:20,
          background: loading?"#1E2535":"#1D9E75",
          border:"none", color: loading?"#5F5E5A":"#0C0F14",
          fontWeight:600, fontSize:14, cursor: loading?"not-allowed":"pointer"
        }}>
          {loading?"Connecting…":mode==="login"?"Sign In →":"Create Account →"}
        </button>
      </div>
    </div>
  );
}

function FeedView({ token, posts, loading, onRefresh }) {
  const [liked, setLiked] = useState({});
  const [activeCategory, setActiveCategory] = useState("all");
  const [showRefresh, setShowRefresh] = useState(true);

  const toggleLike = (id) => setLiked(l=>({...l,[id]:!l[id]}));

  const filtered = activeCategory === "all" ? posts : posts.filter(p =>
    p.category?.toLowerCase().includes(activeCategory) || p.media_type === activeCategory
  );

  const suppressed = posts.filter(p=>p.platform_tried_suppress).length;

  return (
    <div>
      <div style={{ padding:"10px 0 8px", display:"flex", gap:10, overflowX:"auto", paddingLeft:2, paddingRight:2, marginBottom:2 }}>
        {CATEGORIES.map(c=>(
          <div key={c.id} onClick={()=>setActiveCategory(c.id)} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, flexShrink:0, cursor:"pointer" }}>
            <div style={{ width:48, height:48, borderRadius:"50%", border:`2px solid ${activeCategory===c.id?"#1D9E75":"#1E2535"}`, display:"flex", alignItems:"center", justifyContent:"center", background: activeCategory===c.id?"#0F6E5620":"#13171F", fontSize:20 }}>
              {c.icon}
            </div>
            <div style={{ fontSize:9, color:activeCategory===c.id?"#1D9E75":"#5F5E5A", fontWeight:activeCategory===c.id?500:400 }}>{c.label}</div>
          </div>
        ))}
      </div>

      {showRefresh && (
        <div onClick={()=>{ setShowRefresh(false); onRefresh(); }} style={{ background:"#0F6E5610", border:"0.5px solid #1D9E7525", borderRadius:10, padding:"8px 14px", marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", animation:"slideDown 0.2s ease" }}>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:13 }}>↻</span>
            <div style={{ fontSize:11, color:"#1D9E75", fontWeight:500 }}>Feed updated — tap to load latest</div>
          </div>
          <div style={{ fontSize:10, color:"#0F6E56", fontWeight:500 }}>Load</div>
        </div>
      )}

      {suppressed > 0 && (
        <div style={{ background:"#BA751510", border:"0.5px solid #BA751525", borderRadius:10, padding:"8px 14px", marginBottom:10, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:11, fontWeight:500, color:"#EF9F27" }}>⚠️ {suppressed} posts restored by Truth Shield</div>
            <div style={{ fontSize:10, color:"#5F5E5A", marginTop:1 }}>Suppressed on other platforms — visible here</div>
          </div>
          <div style={{ fontSize:10, color:"#1D9E75", fontWeight:500 }}>All visible</div>
        </div>
      )}

      {loading ? (
        <div style={{ textAlign:"center", padding:40, color:"#5F5E5A", fontSize:13 }}>Loading feed…</div>
      ) : filtered.length === 0 ? (
        <div style={{ background:"#13171F", borderRadius:16, border:"0.5px solid #1D9E7530", padding:24, textAlign:"center" }}>
          <div style={{ fontSize:40, marginBottom:12 }}>✏️</div>
          <div style={{ fontSize:14, fontWeight:500, color:"#E8EDF5", marginBottom:6 }}>Be the first to post</div>
          <div style={{ fontSize:12, color:"#5F5E5A", lineHeight:1.6 }}>Share what others are afraid to say. Truth Shield protects your voice.</div>
        </div>
      ) : (
        filtered.map(p=><PostCard key={p.id} post={p} onLike={toggleLike} liked={!!liked[p.id]} />)
      )}
    </div>
  );
}

function ShieldView({ token }) {
  const [content, setContent] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  const analyze = async () => {
    if (!content.trim()) return;
    setLoading(true); setResult(null);
    await new Promise(r=>setTimeout(r,1200));
    const score = Math.floor(Math.random()*40)+55;
    setResult({ score, verdict:"legitimate", reasoning:"Content appears to be factual reporting with verifiable claims. Public interest score is high." });
    setLoading(false);
  };

  return (
    <div>
      <div style={{ background:"#13171F", borderRadius:16, border:"0.5px solid #1E2535", padding:16, marginBottom:12 }}>
        <div style={{ fontSize:15, fontWeight:500, color:"#E8EDF5", marginBottom:4 }}>🛡 Truth Shield Analysis</div>
        <div style={{ fontSize:12, color:"#5F5E5A", lineHeight:1.6, marginBottom:14 }}>Submit any content for real-time disinformation analysis. Results stored immutably on IPFS.</div>
        <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="Paste any content to analyze — news article, social post, claim…" rows={4}
          style={{ width:"100%", background:"#0C0F14", border:"0.5px solid #1E2535", borderRadius:12, padding:"12px 14px", color:"#E8EDF5", fontSize:13, resize:"none", lineHeight:1.6 }} />
        <div style={{ marginTop:10 }}>
          <button onClick={analyze} disabled={loading||!content.trim()} style={{
            padding:"10px 20px", borderRadius:20,
            background: !content.trim()?"#1E2535":"#1D9E75",
            border:"none", color: !content.trim()?"#5F5E5A":"#0C0F14",
            fontWeight:600, fontSize:13, cursor: !content.trim()?"not-allowed":"pointer"
          }}>{loading?"Analyzing…":"🛡 Analyze"}</button>
        </div>
        {result && (
          <div style={{ marginTop:14, padding:14, background:"#0F6E5610", border:"0.5px solid #1D9E7530", borderRadius:12 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
              <CandorRing score={result.score} size={56} />
              <div>
                <div style={{ fontSize:13, fontWeight:500, color:"#1D9E75" }}>Legitimate</div>
                <div style={{ fontSize:11, color:"#5F5E5A" }}>Confidence: {result.score}%</div>
              </div>
            </div>
            <p style={{ fontSize:12, color:"#B4B2A9", lineHeight:1.6, margin:0 }}>{result.reasoning}</p>
          </div>
        )}
      </div>
    </div>
  );
}

function ProfileView({ user, onLogout }) {
  const tierM = TIER_META[user.tier] || TIER_META.standard;
  return (
    <div>
      <div style={{ background:"#13171F", borderRadius:16, border:"0.5px solid #1E2535", padding:20, marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:20 }}>
          <div style={{ width:60, height:60, borderRadius:"50%", background:`${tierM.color}22`, border:`2px solid ${tierM.color}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, fontWeight:500, color:tierM.color }}>
            {user.username.substring(0,2).toUpperCase()}
          </div>
          <div>
            <div style={{ fontSize:16, fontWeight:500, color:"#E8EDF5" }}>@{user.username}</div>
            <div style={{ fontSize:12, color:tierM.color, marginTop:3 }}>{tierM.icon} {tierM.label} Account</div>
          </div>
        </div>
        {[
          ["Identity stored", user.tier==="standard"?"Username + hashed email":"Zero PII", user.tier==="standard"?"#EF9F27":"#1D9E75"],
          ["Content encrypted", user.tier==="whistleblower"?"AES-256-GCM E2E":"In transit TLS", "#1D9E75"],
          ["IP address logged", "24 hours max, then purged", "#1D9E75"],
          ["Data sold", "Never — no advertising model", "#1D9E75"],
          ["IPFS storage", "Permanent — cannot be deleted", "#EF9F27"],
        ].map(([k,v,c])=>(
          <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"0.5px solid #1E2535", alignItems:"center" }}>
            <span style={{ fontSize:12, color:"#5F5E5A" }}>{k}</span>
            <span style={{ fontSize:11, color:c, fontWeight:500 }}>{v}</span>
          </div>
        ))}
      </div>
      <button onClick={onLogout} style={{ width:"100%", padding:"13px", borderRadius:20, background:"#E24B4A15", border:"0.5px solid #E24B4A30", color:"#E24B4A", fontWeight:600, fontSize:14, cursor:"pointer" }}>
        Sign Out
      </button>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("feed");
  const [posts, setPosts] = useState(MOCK_POSTS);
  const [loading, setLoading] = useState(false);
  const [composing, setComposing] = useState(false);

  const loadFeed = useCallback(async (token) => {
    setLoading(true);
    try {
      const res = await fetch(`${API}/api/v1/feed`, {
        headers: token ? {"Authorization":`Bearer ${token}`} : {}
      });
      const data = await res.json();
      if (data.posts?.length > 0) setPosts(data.posts);
      else setPosts(MOCK_POSTS);
    } catch(e) { setPosts(MOCK_POSTS); }
    setLoading(false);
  }, []);

  const onAuth = (u) => { setUser(u); loadFeed(u.token); };

  if (!user) return <AuthScreen onAuth={onAuth} />;

  const NAV = [
    { id:"feed", icon:"🏠", label:"Home" },
    { id:"shield", icon:"🛡", label:"Shield" },
    { id:"governance", icon:"🗳", label:"Vote" },
    { id:"profile", icon:"👤", label:"Profile" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"#0C0F14", paddingBottom:80 }}>
      <div style={{ position:"sticky", top:0, zIndex:50, background:"#0C0F14EE", backdropFilter:"blur(12px)", borderBottom:"0.5px solid #1E2535", padding:"13px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:20, fontFamily:"'DM Serif Display',serif", color:"#E8EDF5", letterSpacing:0.5 }}>
            Candor <span style={{ color:"#1D9E75" }}>◆</span>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ fontSize:10, color:"#1D9E75", fontWeight:500 }}>● LIVE</div>
          <button onClick={()=>setComposing(true)} style={{ padding:"8px 16px", borderRadius:20, background:"#1D9E75", border:"none", color:"#0C0F14", fontWeight:600, fontSize:13, cursor:"pointer" }}>+ Post</button>
        </div>
      </div>

      <div style={{ maxWidth:600, margin:"0 auto", padding:"14px 12px 20px" }}>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:15, fontWeight:500, color:"#E8EDF5" }}>
            {tab==="feed"&&"📡 Open Feed"}
            {tab==="shield"&&"🛡 Truth Shield"}
            {tab==="governance"&&"🗳 Governance"}
            {tab==="profile"&&"👤 Profile"}
          </div>
          <div style={{ fontSize:11, color:"#5F5E5A", marginTop:2 }}>
            {tab==="feed"&&"Anti-suppression · CANDOR scored · IPFS stored"}
            {tab==="shield"&&"Real-time disinformation analysis · Immutable verdicts"}
            {tab==="governance"&&"Community-controlled algorithm · On-chain votes"}
            {tab==="profile"&&`@${user.username} · ${TIER_META[user.tier]?.label} account`}
          </div>
        </div>

        {tab==="feed" && <FeedView token={user.token} posts={posts} loading={loading} onRefresh={()=>loadFeed(user.token)} />}
        {tab==="shield" && <ShieldView token={user.token} />}
        {tab==="governance" && (
          <div style={{ textAlign:"center", padding:60, color:"#5F5E5A" }}>
            <div style={{ fontSize:40, marginBottom:12 }}>🗳</div>
            <div style={{ fontSize:15, fontWeight:500, color:"#E8EDF5", marginBottom:6 }}>Governance</div>
            <div style={{ fontSize:13 }}>Community voting on algorithm weights coming soon</div>
          </div>
        )}
        {tab==="profile" && <ProfileView user={user} onLogout={()=>setUser(null)} />}
      </div>

      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#0C0F14EE", backdropFilter:"blur(12px)", borderTop:"0.5px solid #1E2535", display:"flex", zIndex:50 }}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{ flex:1, padding:"12px 6px", background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, borderTop: tab===n.id?"2px solid #1D9E75":"2px solid transparent", color: tab===n.id?"#1D9E75":"#5F5E5A" }}>
            <span style={{ fontSize:19 }}>{n.icon}</span>
            <span style={{ fontSize:9, fontWeight:tab===n.id?500:400 }}>{n.label}</span>
          </button>
        ))}
      </div>

      {composing && <ComposeModal token={user.token} onClose={()=>setComposing(false)} onPosted={()=>loadFeed(user.token)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
