app            = "ofa-telegram-bot"
primary_region = "iad"
kill_signal    = "SIGINT"
kill_timeout   = 10

[build]
  dockerfile = "Dockerfile.bot"

[env]
  NODE_ENV     = "production"
  OFA_API_BASE = "https://api.openfeed.network"

[http_service]
  internal_port = 8080
  force_https   = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256
