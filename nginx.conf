# ═══════════════════════════════════════════════════════════════════════════
# OFA PLATFORM — Nginx Configuration
# Use this if deploying to a VPS (DigitalOcean, Linode, Hetzner)
# instead of Fly.io
#
# SETUP ON VPS:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d openfeed.network -d www.openfeed.network
#   sudo cp nginx.conf /etc/nginx/sites-available/openfeed
#   sudo ln -s /etc/nginx/sites-available/openfeed /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone  $binary_remote_addr zone=api:10m     rate=30r/m;
limit_req_zone  $binary_remote_addr zone=auth:10m    rate=5r/m;
limit_req_zone  $binary_remote_addr zone=general:10m rate=60r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn:10m;

upstream ofa_gateway {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name openfeed.network www.openfeed.network;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name openfeed.network www.openfeed.network;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/openfeed.network/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openfeed.network/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://ipfs.io; connect-src 'self' https://api.anthropic.com https://ipfs.io wss://openfeed.network;" always;

    # PWA headers
    add_header Service-Worker-Allowed "/";

    # Connection limits
    limit_conn conn 20;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    application/x-javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;

    # Root — serve PWA
    root /var/www/ofa/public;
    index index.html;

    # PWA manifest & service worker — no cache
    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        limit_req zone=general burst=10 nodelay;
    }

    # Static assets — aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # API — proxy to Node.js gateway with rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://ofa_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # CORS
        add_header Access-Control-Allow-Origin  "https://openfeed.network" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"        always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) { return 204; }
    }

    # Auth endpoints — stricter rate limiting
    location ~ ^/api/v1/users/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://ofa_gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — for real-time feed updates
    location /ws {
        proxy_pass         http://ofa_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Health check — public
    location /health {
        proxy_pass http://ofa_gateway;
        access_log off;
    }

    # SPA fallback — all unknown routes → index.html (PWA handles routing)
    location / {
        limit_req   zone=general burst=30 nodelay;
        try_files   $uri $uri/ /index.html;
        add_header  Cache-Control "no-cache";
    }

    # Block common attack patterns
    location ~* (\.php|\.asp|\.aspx|\.jsp|wp-admin|wp-login) {
        return 404;
    }

    # Logging
    access_log /var/log/nginx/ofa_access.log combined;
    error_log  /var/log/nginx/ofa_error.log  warn;
}
